<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Booking.com - The Ethereal Navigator</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS & JS for Real Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration based on DESIGN.md -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            900: '#001629',
                            container: '#002b49'
                        },
                        secondary: {
                            500: '#00658d'
                        },
                        tertiary: {
                            accent: '#ffb870'
                        },
                        surface: {
                            bg: '#f6fafe',
                            low: '#f0f4f8',
                            highest: '#dfe3e7',
                            lowest: '#ffffff',
                        },
                        on: {
                            surface: '#171c1f'
                        }
                    },
                    boxShadow: {
                        'ethereal': '0 12px 32px rgba(23, 28, 31, 0.06)',
                        'ethereal-sm': '0 4px 12px rgba(23, 28, 31, 0.04)',
                        'dropdown': '0 20px 50px rgba(0, 22, 41, 0.15)',
                    },
                    borderRadius: {
                        'DEFAULT': '1rem',
                        'md': '1.5rem',
                        'xl': '3rem',
                        'full': '9999px',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body {
            background-color: #f6fafe;
            color: #171c1f;
            -webkit-font-smoothing: antialiased;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Tinh chỉnh bản đồ Leaflet Fullscreen */
        .leaflet-container {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f6fafe;
        }
        .leaflet-control-attribution {
            display: none;
        }
        
        /* Hiệu ứng mượt cho Bottom Sheet */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // --- ALL Icons (Merged) ---
        const IconBed = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>;
        const IconPlane = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l5.5 4L5 15.5 3 15l-1 1 3 3 1-1-.5-2 3.5-3.5 4 5.5h1.2l.6-1.1c.4-.2.7-.6.6-1.1Z"/></svg>;

        const IconUser = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconCalendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconGlobe = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const IconSearch = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const IconWifi = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><path d="M12 20h.01"/></svg>;
        const IconUtensils = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2 M7 2v20 M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>;
        const IconMap = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>;
        const IconMedical = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 12c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2s10 4.48 10 10Z"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>;
        const IconStore = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>;
        const IconHelp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
        const IconPhone = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
        const IconCamera = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
        const IconTool = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>;
        const IconStar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
        const IconSparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
        const IconFilter = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;

        const App = () => {
            const [isMapFullScreen, setIsMapFullScreen] = React.useState(false);

            React.useEffect(() => {
                if (isMapFullScreen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'auto';
                }
            }, [isMapFullScreen]);

            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden">
                    <HeaderAndHero />
                    
                    <main className="px-6 md:px-12 xl:px-24 max-w-7xl mx-auto -mt-10 relative z-10 pb-10 flex-1">
                        <SearchModule />
                        <OffersSection />
                        <PropertyTypes />
                        <MapSection onOpenFullMap={() => setIsMapFullScreen(true)} />
                        <ToursAndTickets />
                        <DiningAndNightlife />
                        <EssentialServices />
                        <UniqueProperties />
                        <PhuQuocAlbum />
                    </main>

                    <Footer />
                    <FloatingAIAssistant />

                    {/* LỚP BẢN ĐỒ FULL-SCREEN MỚI */}
                    {isMapFullScreen && (
                        <FullScreenMap onClose={() => setIsMapFullScreen(false)} />
                    )}
                </div>
            );
        };

        // --- CORE MODULE: ETHEREAL MAP EXPERIENCE ---

        const mockMapData = {
            liveEvents: [
                {
                    id: 'e1',
                    title: 'Sunset Acoustic Live',
                    category: 'live',
                    location: 'Sunset Sanato Beach Club',
                    lat: 10.1333,
                    lng: 103.9667,
                    startTime: '17:00',
                    endTime: '19:30',
                    price: 'Từ 150.000đ',
                    img: 'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=crop&w=400&q=80',
                }
            ],
            pois: [
                // Layer 2: Attractions
                { id: 'p1', title: 'Chợ Đêm Phú Quốc', category: 'attraction', lat: 10.2173, lng: 103.9595, rating: '4.5', reviews: '3.2k' },
                { id: 'p2', title: 'Ga Cáp Treo Hòn Thơm', category: 'attraction', lat: 10.0163, lng: 104.0151, rating: '4.8', reviews: '5.1k' },
                { id: 'p3', title: 'VinWonders Phú Quốc', category: 'attraction', lat: 10.3340, lng: 103.8566, rating: '4.7', reviews: '8k' },
                // Layer 3: Accommodation
                { id: 'h1', title: 'JW Marriott Emerald Bay', category: 'accommodation', lat: 10.0240, lng: 104.0100, rating: '4.9', reviews: '1.5k', price: '9.500.000đ' },
                { id: 'h2', title: 'Vinpearl Discovery', category: 'accommodation', lat: 10.3300, lng: 103.8500, rating: '4.6', reviews: '2.2k', price: '4.200.000đ' },
                // Layer 4: Dining
                { id: 'd1', title: 'Nhà hàng Xin Chào', category: 'dining', lat: 10.2185, lng: 103.9580, rating: '4.4', reviews: '1.8k' },
                { id: 'd2', title: 'Búp Restaurant', category: 'dining', lat: 10.2160, lng: 103.9600, rating: '4.5', reviews: '900' },
                // Layer 6: Medical
                { id: 'm1', title: 'Bệnh viện Vinmec', category: 'medical', lat: 10.3350, lng: 103.8600, phone: '0297 3985 588' },
                { id: 'm2', title: 'TT Y tế TP Phú Quốc', category: 'medical', lat: 10.2150, lng: 103.9650, phone: '0297 3846 074' },
                // Layer 7: Utilities
                { id: 'u1', title: 'ATM Vietcombank', category: 'utility', lat: 10.2170, lng: 103.9590 },
                { id: 'u2', title: 'Bưu điện Phú Quốc', category: 'utility', lat: 10.2180, lng: 103.9610 }
            ]
        };

        const categoryMeta = {
            all: { label: 'Tất cả', color: 'secondary-500', icon: IconMap },
            live: { label: 'Sao Vàng LIVE', color: 'tertiary-accent', icon: IconStar },
            attraction: { label: 'Điểm tham quan', color: 'primary-900', icon: IconMap },
            accommodation: { label: 'Lưu trú', color: 'secondary-500', icon: IconBed },
            dining: { label: 'Ẩm thực', color: 'orange-500', icon: IconUtensils },
            medical: { label: 'Y tế & Khẩn cấp', color: 'red-500', icon: IconMedical },
            utility: { label: 'Tiện ích', color: 'blue-400', icon: IconTool }
        };

        const FullScreenMap = ({ onClose }) => {
            const mapContainerRef = React.useRef(null);
            const mapInstanceRef = React.useRef(null);
            const markersLayerRef = React.useRef(L.layerGroup());
            const [selectedLocation, setSelectedLocation] = React.useState(null);
            const [activeCategory, setActiveCategory] = React.useState('all');

            const renderMarkers = (category) => {
                if (!mapInstanceRef.current) return;
                
                markersLayerRef.current.clearLayers();

                const filteredPois = category === 'all' 
                    ? [...mockMapData.pois, ...mockMapData.liveEvents] 
                    : [...mockMapData.pois, ...mockMapData.liveEvents].filter(p => p.category === category);

                filteredPois.forEach(poi => {
                    let icon;
                    if (poi.category === 'live') {
                        const starIconHtml = `
                            <div class="relative flex items-center justify-center cursor-pointer">
                                <div class="absolute w-14 h-14 bg-[#ffb870]/40 rounded-full animate-ping"></div>
                                <div class="absolute w-10 h-10 bg-[#ffb870]/30 rounded-full"></div>
                                <div class="w-7 h-7 bg-[#ffb870] rounded-full shadow-[0_0_15px_rgba(255,184,112,0.6)] z-10 border-[2px] border-white flex items-center justify-center">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                                </div>
                            </div>
                        `;
                        icon = L.divIcon({ className: '', html: starIconHtml, iconSize: [56, 56], iconAnchor: [28, 28] });
                    } else {
                        const color = poi.category === 'medical' ? '#ef4444' : (poi.category === 'dining' ? '#f97316' : '#00658d');
                        const iconHtml = `
                            <div class="w-8 h-8 bg-white rounded-full shadow-ethereal flex items-center justify-center border-2 cursor-pointer transform hover:scale-110 transition-transform" style="border-color: ${color}; color: ${color}">
                                <div class="w-2 h-2 rounded-full" style="background-color: ${color}"></div>
                            </div>
                        `;
                        icon = L.divIcon({ className: '', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 16] });
                    }

                    const marker = L.marker([poi.lat, poi.lng], { icon }).addTo(markersLayerRef.current);
                    marker.on('click', () => {
                        setSelectedLocation(poi);
                        mapInstanceRef.current.flyTo([poi.lat - 0.015, poi.lng], 14, { duration: 0.8 });
                    });
                });
            };

            React.useEffect(() => {
                if (!mapInstanceRef.current && mapContainerRef.current) {
                    mapInstanceRef.current = L.map(mapContainerRef.current, {
                        zoomControl: false,
                        attributionControl: false
                    }).setView([10.2289, 103.9572], 11);

                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        maxZoom: 19,
                    }).addTo(mapInstanceRef.current);

                    markersLayerRef.current.addTo(mapInstanceRef.current);
                }

                renderMarkers(activeCategory);

                return () => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, [activeCategory]);

            // Hàm xử lý tương tác của các nút bấm (Mock actions)
            const handleActionClick = (actionName, locationInfo) => {
                alert(`Đang thực hiện thao tác: "${actionName}" cho địa điểm [${locationInfo.title}]...`);
            };

            return (
                <div className="fixed inset-0 z-[100] bg-surface-bg flex flex-col animate-in fade-in duration-300">
                    <div ref={mapContainerRef} className="absolute inset-0 z-0"></div>

                    {/* Top UI Overlay */}
                    <div className="absolute top-0 left-0 right-0 p-4 md:p-6 z-10 flex flex-col md:flex-row gap-3 pointer-events-none items-start">
                        <button 
                            onClick={onClose}
                            className="w-12 h-12 bg-white/90 backdrop-blur-xl rounded-full shadow-ethereal flex items-center justify-center text-primary-900 border border-white/60 hover:bg-surface-low transition-colors pointer-events-auto shrink-0"
                        >
                            <IconArrowLeft />
                        </button>
                        
                        <div className="w-full max-w-2xl flex flex-col gap-3 pointer-events-auto">
                            <div className="bg-white/90 backdrop-blur-xl h-12 rounded-full shadow-ethereal flex items-center px-4 border border-white/60">
                                <IconSearch className="text-on-surface/50 w-5 h-5 mr-2" />
                                <input type="text" placeholder="Tìm kiếm địa điểm, sự kiện..." className="bg-transparent border-none outline-none w-full text-sm font-semibold text-primary-900" />
                            </div>
                            
                            {/* Layer Filter Bar */}
                            <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
                                {Object.entries(categoryMeta).map(([key, meta]) => (
                                    <button 
                                        key={key}
                                        onClick={() => setActiveCategory(key)}
                                        className={`px-4 py-2.5 rounded-full shadow-sm text-xs font-bold whitespace-nowrap transition-all flex items-center gap-2 border ${
