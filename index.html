<!DOCTYPE html>

            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],

                    colors: {

                            900: '#001629',
                            container: '#002b49'

                        secondary: {

                        tertiary: {

                        surface: {
                            bg: '#f6fafe',
                            low: '#f0f4f8',
                            highest: '#dfe3e7',
                            lowest: '#ffffff',

                        on: {
                            surface: '#171c1f'

                    boxShadow: {

                    borderRadius: {
                        'DEFAULT': '1rem',
                        'md': '1.5rem',
                        'xl': '3rem',

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <style>
        body {
            background-color: #f6fafe; /* surface-bg */
            color: #171c1f; /* on-surface */
            -webkit-font-smoothing: antialiased;
        }
        
        /* Hide scrollbar for horizontal scrolling but keep functionality */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom Island Shape for Map */
        .island-shape {
            background-color: #eef3de;
            border-radius: 43% 57% 38% 62% / 47% 41% 59% 53%;
            box-shadow: inset 20px 20px 40px rgba(255,255,255,0.5), inset -10px -10px 20px rgba(0,0,0,0.02);
        }
        .island-shape-inner {
            background-color: #e0ebd1;
            border-radius: 50% 40% 60% 40% / 40% 50% 40% 60%;
            filter: blur(4px);
        }
    </style>
</head>
<body>
