<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản | Booking.com - The Ethereal Navigator</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration based on Design System -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            900: '#001629',
                            container: '#002b49'
                        },
                        secondary: {
                            500: '#00658d'
                        },
                        tertiary: {
                            accent: '#ffb870'
                        },
                        surface: {
                            bg: '#f6fafe',
                            low: '#f0f4f8',
                            highest: '#dfe3e7',
                            lowest: '#ffffff',
                        },
                        on: {
                            surface: '#171c1f'
                        }
                    },
                    boxShadow: {
                        'ethereal': '0 12px 32px rgba(23, 28, 31, 0.06)',
                        'dropdown': '0 20px 50px rgba(0, 22, 41, 0.15)',
                    },
                    borderRadius: {
                        'DEFAULT': '1rem',
                        'md': '1.5rem',
                        'xl': '3rem',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body {
            background-color: #001629; /* primary-900 */
            color: #171c1f;
            -webkit-font-smoothing: antialiased;
        }
        
        .auth-bg {
            background: radial-gradient(circle at 0% 0%, #002b49 0%, #001629 100%);
            min-height: 100vh;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar for the form */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 22, 41, 0.1);
            border-radius: 10px;
        }

        /* Floating elements effect */
        .float-blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: #00658d;
            filter: blur(100px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Icons ---
        const IconMail = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const IconLock = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconUser = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconArrowLeft = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
        const IconGlobe = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;

        const App = () => {
            const [view, setView] = React.useState('login'); // 'login' | 'register' | 'forgot'

            return (
                <div className="auth-bg relative flex items-center justify-center p-6 overflow-hidden">
                    {/* Decorative Background Blobs */}
                    <div className="float-blob top-[-10%] left-[-10%]"></div>
                    <div className="float-blob bottom-[-10%] right-[-10%] opacity-10"></div>
                    
                    <div className="w-full max-w-[480px] z-10 py-10">
                        {/* Logo / Header */}
                        <div className="text-center mb-10">
                            <h1 className="text-3xl font-bold text-white tracking-tight cursor-pointer">Booking.com</h1>
                            <p className="text-white/40 text-sm mt-2 font-medium uppercase tracking-widest text-[10px]">The Ethereal Navigator</p>
                        </div>

                        {/* Auth Card */}
                        <div className="bg-white/95 backdrop-blur-2xl rounded-[2.5rem] p-8 md:p-10 shadow-dropdown border border-white/20 animate-fade-in max-h-[85vh] overflow-y-auto custom-scroll">
                            {view === 'login' && <LoginForm onViewChange={setView} />}
                            {view === 'register' && <RegisterForm onViewChange={setView} />}
                            {view === 'forgot' && <ForgotForm onViewChange={setView} />}
                        </div>

                        {/* Footer links */}
                        <div className="mt-8 flex justify-center space-x-6">
                            <a href="#" className="text-xs font-bold text-white/30 hover:text-white transition-colors uppercase tracking-widest">Trợ giúp</a>
                            <a href="#" className="text-xs font-bold text-white/30 hover:text-white transition-colors uppercase tracking-widest">Quyền riêng tư</a>
                            <a href="#" className="text-xs font-bold text-white/30 hover:text-white transition-colors uppercase tracking-widest">Điều khoản</a>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Sub-Components ---

        const InputField = ({ label, icon: Icon, type = "text", placeholder }) => (
            <div className="flex flex-col space-y-2 mb-4 group">
                <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest ml-1">{label}</label>
                <div className="relative">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface/30 group-focus-within:text-secondary-500 transition-colors">
                        <Icon />
                    </div>
                    <input 
                        type={type}
                        placeholder={placeholder}
                        className="w-full bg-surface-low rounded-2xl py-4 pl-12 pr-4 text-sm font-semibold text-primary-900 outline-none border border-transparent focus:bg-white focus:shadow-ethereal transition-all placeholder:text-on-surface/20"
                    />
                </div>
            </div>
        );

        const SelectField = ({ label, icon: Icon, options, defaultValue }) => (
            <div className="flex flex-col space-y-2 mb-4 group">
                <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest ml-1">{label}</label>
                <div className="relative">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface/30 group-focus-within:text-secondary-500 transition-colors pointer-events-none">
                        <Icon />
                    </div>
                    <select 
                        defaultValue={defaultValue}
                        className="w-full bg-surface-low rounded-2xl py-4 pl-12 pr-10 text-sm font-semibold text-primary-900 outline-none border border-transparent focus:bg-white focus:shadow-ethereal transition-all appearance-none cursor-pointer"
                    >
                        {options.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                    </select>
                    <div className="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface/30 pointer-events-none">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                </div>
            </div>
        );

        const PrimaryButton = ({ children, onClick, loading = false }) => (
            <button 
                onClick={onClick}
                className="w-full bg-primary-900 text-white font-bold py-4 rounded-2xl hover:bg-secondary-500 transition-all shadow-md active:scale-[0.98] mt-4 flex items-center justify-center space-x-2"
            >
                <span>{children}</span>
            </button>
        );

        // --- View Forms ---

        const LoginForm = ({ onViewChange }) => (
            <div className="animate-in">
                <h2 className="text-2xl font-bold text-primary-900 tracking-tight mb-2">Chào mừng trở lại</h2>
                <p className="text-sm text-on-surface/50 mb-8 font-medium">Nhập thông tin để truy cập chuyến đi của bạn</p>
                
                <form onSubmit={(e) => e.preventDefault()}>
                    <InputField label="Email" icon={IconMail} type="email" placeholder="email@example.com" />
                    <InputField label="Mật khẩu" icon={IconLock} type="password" placeholder="••••••••" />
                    
                    <div className="flex justify-end mb-6">
                        <button 
                            type="button"
                            onClick={() => onViewChange('forgot')}
                            className="text-xs font-bold text-secondary-500 hover:text-primary-900 transition-colors"
                        >Quên mật khẩu?</button>
                    </div>

                    <PrimaryButton>Đăng nhập</PrimaryButton>
                </form>

                <p className="text-center mt-10 text-sm font-medium text-on-surface/60">
                    Chưa có tài khoản? {' '}
                    <button 
                        type="button"
                        onClick={() => onViewChange('register')}
                        className="font-bold text-secondary-500 hover:underline"
                    >Đăng ký ngay</button>
                </p>
            </div>
        );

        const RegisterForm = ({ onViewChange }) => {
            const nationalities = [
                { value: 'vn', label: 'Việt Nam' },
                { value: 'us', label: 'Hoa Kỳ' },
                { value: 'jp', label: 'Nhật Bản' },
                { value: 'kr', label: 'Hàn Quốc' },
                { value: 'fr', label: 'Pháp' }
            ];

            const languages = [
                { value: 'vi', label: 'Tiếng Việt' },
                { value: 'en', label: 'English' },
                { value: 'ja', label: '日本語' },
                { value: 'ko', label: '한국어' }
            ];

            return (
                <div className="animate-in">
                    <h2 className="text-2xl font-bold text-primary-900 tracking-tight mb-2">Tạo tài khoản mới</h2>
                    <p className="text-sm text-on-surface/50 mb-8 font-medium">Khám phá hàng triệu chỗ nghỉ và ưu đãi đặc quyền</p>
                    
                    <form onSubmit={(e) => e.preventDefault()}>
                        <InputField label="Tên đầy đủ" icon={IconUser} placeholder="Nguyễn Văn A" />
                        <InputField label="Email" icon={IconMail} type="email" placeholder="email@example.com" />
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                            <SelectField label="Quốc tịch" icon={IconGlobe} options={nationalities} defaultValue="vn" />
                            <SelectField label="Ngôn ngữ" icon={IconGlobe} options={languages} defaultValue="vi" />
                        </div>

                        <InputField label="Mật khẩu" icon={IconLock} type="password" placeholder="••••••••" />
                        <InputField label="Xác nhận mật khẩu" icon={IconLock} type="password" placeholder="••••••••" />
                        
                        <div className="flex items-start space-x-3 mt-4 mb-6">
                            <input type="checkbox" className="mt-1 w-4 h-4 rounded accent-secondary-500 border-surface-low" id="terms" />
                            <label htmlFor="terms" className="text-xs text-on-surface/50 font-medium leading-relaxed">
                                Tôi đồng ý với các <a href="#" className="text-secondary-500 font-bold hover:underline">Điều khoản dịch vụ</a> và <a href="#" className="text-secondary-500 font-bold hover:underline">Chính sách bảo mật</a>.
                            </label>
                        </div>

                        <PrimaryButton>Đăng ký tài khoản</PrimaryButton>
                    </form>

                    <p className="text-center mt-8 text-sm font-medium text-on-surface/60">
                        Đã có tài khoản? {' '}
                        <button 
                            type="button"
                            onClick={() => onViewChange('login')}
                            className="font-bold text-secondary-500 hover:underline"
                        >Đăng nhập</button>
                    </p>
                </div>
            );
        };

        const ForgotForm = ({ onViewChange }) => (
            <div className="animate-in">
                <button 
                    type="button"
                    onClick={() => onViewChange('login')}
                    className="flex items-center space-x-2 text-on-surface/40 hover:text-primary-900 transition-colors mb-6 text-xs font-bold uppercase tracking-widest"
                >
                    <IconArrowLeft />
                    <span>Quay lại</span>
                </button>

                <h2 className="text-2xl font-bold text-primary-900 tracking-tight mb-2">Quên mật khẩu?</h2>
                <p className="text-sm text-on-surface/50 mb-8 font-medium">Nhập địa chỉ email của bạn, chúng tôi sẽ gửi liên kết để đặt lại mật khẩu.</p>
                
                <form onSubmit={(e) => e.preventDefault()}>
                    <InputField label="Địa chỉ Email" icon={IconMail} type="email" placeholder="email@example.com" />
                    <PrimaryButton>Gửi yêu cầu</PrimaryButton>
                </form>

                <div className="mt-8 p-4 bg-surface-low rounded-2xl border border-surface-highest/20">
                    <p className="text-xs text-on-surface/60 leading-relaxed text-center">
                        Nếu bạn không nhận được email trong 5 phút, vui lòng kiểm tra thư mục Spam.
                    </p>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
