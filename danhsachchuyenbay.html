<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả Chuyến bay | Booking.com - The Ethereal Navigator</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration based on DESIGN.md -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            900: '#001629',
                            container: '#002b49'
                        },
                        secondary: {
                            500: '#00658d'
                        },
                        tertiary: {
                            accent: '#ffb870'
                        },
                        surface: {
                            bg: '#f6fafe',
                            low: '#f0f4f8',
                            highest: '#dfe3e7',
                            lowest: '#ffffff',
                        },
                        on: {
                            surface: '#171c1f'
                        }
                    },
                    boxShadow: {
                        'ethereal': '0 12px 32px rgba(23, 28, 31, 0.06)',
                        'ethereal-sm': '0 4px 12px rgba(23, 28, 31, 0.04)',
                        'dropdown': '0 20px 50px rgba(0, 22, 41, 0.15)',
                    },
                    borderRadius: {
                        'DEFAULT': '1rem',
                        'md': '1.5rem',
                        'xl': '3rem',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body {
            background-color: #f6fafe; /* surface-bg */
            color: #171c1f; /* on-surface */
            -webkit-font-smoothing: antialiased;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .animate-in {
            animation: fadeInScale 0.2s ease-out forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Custom Checkbox */
        .ethereal-checkbox {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 0.375rem;
            background-color: #f0f4f8;
            border: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ethereal-checkbox:checked {
            background-color: #00658d;
        }
        .ethereal-checkbox:checked::after {
            content: '';
            width: 0.375rem;
            height: 0.625rem;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Icons ---
        const IconBed = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>;
        const IconPlane = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l5.5 4L5 15.5 3 15l-1 1 3 3 1-1-.5-2 3.5-3.5 4 5.5h1.2l.6-1.1c.4-.2.7-.6.6-1.1Z"/></svg>;
        const IconPlaneTakeoff = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 22h20"/><path d="M6.36 13.4 22 9.22l-1.42-3.85L5 9.77V7l-2 1v5.4l1.36.4L7 16l-3.32-.98-1.58.54 4.26 2.84"/></svg>;
        const IconPlaneLanding = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 22h20"/><path d="m3.98 9.22 15.64 4.4L21 9.77V7l-2 1v5.4l-1.36.4L14 16l3.32-.98 1.58.54-4.26 2.84"/></svg>;
        const IconStore = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>;
        const IconMedical = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2s10 4.48 10 10Z"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>;
        const IconHelp = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
        const IconTaxi = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/><rect width="4" height="4" x="10" y="3" rx="1"/></svg>;
        const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const IconFilter = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const IconSuitcase = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
        const IconGlobe = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>;
        const IconMinus = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>;
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
        const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;

        // Flight Data Mock
        const flights = [
            { id: 1, airline: 'VietJet Air', airlineCode: 'VJ', logo: 'VJ', color: '#ED1B24', departTime: '06:15', arriveTime: '08:25', duration: '2h 10m', type: 'Bay thẳng', price: 950000, badge: 'Rẻ nhất', badgeColor: 'bg-[#e6f4ea] text-[#137333]', baggage: '7kg xách tay' },
            { id: 2, airline: 'Vietnam Airlines', airlineCode: 'VN', logo: 'VN', color: '#005F6E', departTime: '07:00', arriveTime: '09:10', duration: '2h 10m', type: 'Bay thẳng', price: 1250000, badge: 'Tốt nhất', badgeColor: 'bg-secondary-500/10 text-secondary-500', baggage: '10kg xách tay + 23kg ký gửi' },
            { id: 3, airline: 'Bamboo Airways', airlineCode: 'QH', logo: 'QH', color: '#005E35', departTime: '10:30', arriveTime: '12:45', duration: '2h 15m', type: 'Bay thẳng', price: 1150000, baggage: '7kg xách tay + 20kg ký gửi' },
            { id: 4, airline: 'Vietravel Airlines', airlineCode: 'VU', logo: 'VU', color: '#F3B43A', departTime: '14:20', arriveTime: '16:30', duration: '2h 10m', type: 'Bay thẳng', price: 1050000, baggage: '7kg xách tay' },
            { id: 5, airline: 'Vietnam Airlines', airlineCode: 'VN', logo: 'VN', color: '#005F6E', departTime: '18:00', arriveTime: '20:10', duration: '2h 10m', type: 'Bay thẳng', price: 1450000, baggage: '10kg xách tay + 23kg ký gửi' }
        ];

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden bg-surface-bg">
                    <HeaderWithNav />
                    <SearchHeaderSection />
                    
                    <main className="px-6 md:px-12 xl:px-24 max-w-7xl mx-auto w-full py-8 flex-1 grid grid-cols-1 lg:grid-cols-4 gap-8">
                        <SidebarFilter />
                        <FlightResults />
                    </main>

                    <FloatingAIAssistant />
                </div>
            );
        };

        // --- Shared UI Logic ---

        const PassengerRow = ({ label, sub, count, setCount, min }) => (
            <div className="flex items-center justify-between">
                <div>
                    <p className="font-bold text-primary-900 text-sm">{label}</p>
                    <p className="text-[10px] text-on-surface/50">{sub}</p>
                </div>
                <div className="flex items-center space-x-3">
                    <button onClick={() => count > min && setCount(count - 1)} className={`w-8 h-8 rounded-full border border-surface-highest flex items-center justify-center transition-colors ${count <= min ? 'opacity-30 cursor-not-allowed' : 'hover:bg-surface-low text-secondary-500'}`}><IconMinus /></button>
                    <span className="font-bold text-primary-900 w-4 text-center text-sm">{count}</span>
                    <button onClick={() => setCount(count + 1)} className="w-8 h-8 rounded-full border border-surface-highest flex items-center justify-center hover:bg-surface-low text-secondary-500"><IconPlus /></button>
                </div>
            </div>
        );

        const CalendarGrid = ({ onSelect }) => {
            const days = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
            const dates = Array.from({ length: 31 }, (_, i) => i + 1);
            return (
                <div className="bg-white p-4 rounded-xl shadow-dropdown border border-surface-highest/40 z-[100] animate-in">
                    <div className="flex items-center justify-between mb-4">
                        <span className="font-bold text-sm text-primary-900">Tháng 5 2026</span>
                        <div className="flex space-x-1">
                            <button className="p-1 hover:bg-surface-low rounded-full"><IconChevronLeft /></button>
                            <button className="p-1 hover:bg-surface-low rounded-full"><IconChevronRight /></button>
                        </div>
                    </div>
                    <div className="grid grid-cols-7 gap-1 text-center mb-2">
                        {days.map(d => <span key={d} className="text-[9px] font-bold text-on-surface/30">{d}</span>)}
                    </div>
                    <div className="grid grid-cols-7 gap-1">
                        {/* Mock start empty spaces */}
                        {[...Array(5)].map((_, i) => <div key={i} />)}
                        {dates.map(d => (
                            <button key={d} onClick={() => onSelect(`${d} Thg 5`)} className={`w-8 h-8 rounded-lg text-xs font-semibold flex items-center justify-center ${d === 20 ? 'bg-secondary-500 text-white' : 'hover:bg-surface-low'}`}>{d}</button>
                        ))}
                    </div>
                </div>
            );
        };

        // --- Primary Components ---

        const NavPill = ({ icon, text, active }) => (
            <button className={`flex items-center space-x-2 px-4 py-2 rounded-full whitespace-nowrap transition-all text-xs font-semibold ${active ? 'bg-white/10 backdrop-blur-md text-white border border-white/20' : 'text-white/70 hover:bg-white/5 hover:text-white'}`}>
                {icon}
                <span>{text}</span>
            </button>
        );

        const HeaderWithNav = () => (
            <header className="bg-primary-900 text-white pt-4 pb-2">
                <div className="px-6 md:px-12 xl:px-24 flex items-center justify-between mb-4">
                    <div className="text-xl font-bold tracking-tight cursor-pointer">Booking.com</div>
                    <div className="flex items-center space-x-4">
                        <button className="flex items-center space-x-1 hover:text-tertiary-accent transition-colors"><IconGlobe /><span className="text-xs font-bold uppercase">VN</span></button>
                        <div className="w-8 h-8 rounded-full bg-tertiary-accent flex items-center justify-center text-primary-900 font-bold">T</div>
                    </div>
                </div>
                <div className="px-6 md:px-12 xl:px-24 flex space-x-2 overflow-x-auto hide-scrollbar pb-2">
                    <NavPill icon={<IconBed />} text="Lưu trú" />
                    <NavPill icon={<IconPlane />} text="Chuyến bay" active />
                    <NavPill icon={<IconStore />} text="Cửa hàng" />
                    <NavPill icon={<IconMedical />} text="Y tế" />
                    <NavPill icon={<IconHelp />} text="Hỗ trợ" />
                    <NavPill icon={<IconTaxi />} text="Taxi sân bay" />
                </div>
            </header>
        );

        const SearchHeaderSection = () => {
            const [isEditing, setIsEditing] = React.useState(false);
            const [showDeparture, setShowDeparture] = React.useState(false);
            const [showPassengers, setShowPassengers] = React.useState(false);

            // Mock State
            const [adults, setAdults] = React.useState(1);
            const [children, setChildren] = React.useState(0);
            const [infants, setInfants] = React.useState(0);
            const total = adults + children + infants;

            if (!isEditing) {
                return (
                    <div className="bg-primary-900 pb-10 pt-2 px-6 md:px-12 xl:px-24 rounded-b-3xl">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-2 md:p-3 justify-between shadow-dropdown">
                            <div className="flex flex-wrap md:flex-nowrap items-center text-white w-full gap-2 md:gap-4 px-2">
                                <div className="flex items-center space-x-3 font-semibold text-sm md:text-base">
                                    <span>Hà Nội (HAN)</span>
                                    <IconArrowRight />
                                    <span>Phú Quốc (PQC)</span>
                                </div>
                                <div className="hidden md:block w-[1px] h-6 bg-white/20"></div>
                                <div className="text-sm font-medium text-white/80">Th 5, 20 Thg 5 <span className="mx-1">-</span> Một chiều</div>
                                <div className="hidden md:block w-[1px] h-6 bg-white/20"></div>
                                <div className="text-sm font-medium text-white/80">{total} Hành khách, Phổ thông</div>
                            </div>
                            <button onClick={() => setIsEditing(true)} className="mt-3 md:mt-0 w-full md:w-auto shrink-0 bg-white text-primary-900 font-bold px-6 py-2.5 rounded-xl hover:bg-surface-low transition-colors shadow-ethereal-sm">
                                Sửa tìm kiếm
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-primary-900 pb-10 pt-2 px-6 md:px-12 xl:px-24 rounded-b-3xl animate-in">
                    <div className="max-w-7xl mx-auto bg-white/95 backdrop-blur-2xl border border-white rounded-[2rem] p-6 shadow-dropdown">
                        <div className="flex flex-col space-y-6">
                            {/* Inputs Grid */}
                            <div className="grid grid-cols-1 lg:grid-cols-4 gap-3">
                                {/* From */}
                                <div className="bg-surface-low p-3 px-4 rounded-2xl group border border-transparent focus-within:border-secondary-500/30 transition-all">
                                    <span className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Nơi đi</span>
                                    <div className="flex items-center space-x-2">
                                        <IconPlaneTakeoff className="text-secondary-500" />
                                        <input defaultValue="Hà Nội (HAN)" className="bg-transparent font-bold text-primary-900 text-sm outline-none w-full" />
                                    </div>
                                </div>
                                {/* To */}
                                <div className="bg-surface-low p-3 px-4 rounded-2xl group opacity-80">
                                    <span className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Nơi đến</span>
                                    <div className="flex items-center space-x-2">
                                        <IconPlaneLanding className="text-on-surface/40" />
                                        <span className="font-bold text-primary-900 text-sm">Phú Quốc (PQC)</span>
                                    </div>
                                </div>
                                {/* Date */}
                                <div className="relative">
                                    <button onClick={() => setShowDeparture(!showDeparture)} className="w-full text-left bg-surface-low p-3 px-4 rounded-2xl border border-transparent hover:border-secondary-500/20 transition-all">
                                        <span className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Ngày đi</span>
                                        <div className="flex items-center space-x-2">
                                            <IconCalendar className="text-secondary-500" />
                                            <span className="font-bold text-primary-900 text-sm">20 Thg 5, 2026</span>
                                        </div>
                                    </button>
                                    {showDeparture && (
                                        <div className="absolute top-full left-0 mt-2 z-[110]">
                                            <CalendarGrid onSelect={() => setShowDeparture(false)} />
                                        </div>
                                    )}
                                </div>
                                {/* Passengers */}
                                <div className="relative">
                                    <button onClick={() => setShowPassengers(!showPassengers)} className="w-full text-left bg-surface-low p-3 px-4 rounded-2xl border border-transparent hover:border-secondary-500/20 transition-all">
                                        <span className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Hành khách</span>
                                        <div className="flex items-center space-x-2">
                                            <IconUser className="text-secondary-500" />
                                            <span className="font-bold text-primary-900 text-sm">{total} Người, Phổ thông</span>
                                        </div>
                                    </button>
                                    {showPassengers && (
                                        <div className="absolute top-full right-0 mt-2 w-72 bg-white p-5 rounded-2xl shadow-dropdown border border-surface-highest/40 z-[110] animate-in">
                                            <div className="space-y-5">
                                                <PassengerRow label="Người lớn" sub="Trên 12 tuổi" count={adults} setCount={setAdults} min={1} />
                                                <PassengerRow label="Trẻ em" sub="2 - 12 tuổi" count={children} setCount={setChildren} min={0} />
                                                <PassengerRow label="Em bé" sub="Dưới 2 tuổi" count={infants} setCount={setInfants} min={0} />
                                            </div>
                                            <button onClick={() => setShowPassengers(false)} className="w-full mt-6 bg-primary-900 text-white py-2.5 rounded-xl font-bold text-sm">Xong</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                            {/* Buttons */}
                            <div className="flex items-center justify-end space-x-3">
                                <button onClick={() => setIsEditing(false)} className="px-6 py-3 font-bold text-on-surface/60 hover:text-primary-900 transition-colors text-sm">Huỷ</button>
                                <button onClick={() => setIsEditing(false)} className="bg-secondary-500 text-white px-8 py-3 rounded-xl font-bold hover:bg-primary-900 transition-all shadow-md text-sm">Cập nhật kết quả</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SidebarFilter = () => (
            <aside className="hidden lg:flex flex-col gap-6 -mt-6">
                <div className="bg-surface-lowest rounded-2xl p-6 shadow-ethereal space-y-6">
                    <div className="flex justify-between items-center pb-4 border-b border-surface-highest/40">
                        <h3 className="font-bold text-primary-900 text-lg flex items-center"><IconFilter /><span className="ml-2">Bộ lọc</span></h3>
                        <button className="text-xs font-bold text-secondary-500">Xoá tất cả</button>
                    </div>
                    <div>
                        <h4 className="font-bold text-primary-900 text-sm mb-3">Điểm dừng</h4>
                        <div className="space-y-3">
                            <label className="flex items-center justify-between group cursor-pointer"><div className="flex items-center space-x-3"><input type="checkbox" className="ethereal-checkbox" defaultChecked /><span className="text-sm font-medium">Bay thẳng</span></div><span className="text-xs font-semibold text-on-surface/50">950k</span></label>
                            <label className="flex items-center justify-between group cursor-pointer"><div className="flex items-center space-x-3"><input type="checkbox" className="ethereal-checkbox" /><span className="text-sm font-medium">1 điểm dừng</span></div><span className="text-xs font-semibold text-on-surface/50">1.8m</span></label>
                        </div>
                    </div>
                    <div>
                        <h4 className="font-bold text-primary-900 text-sm mb-3">Hãng bay</h4>
                        <div className="space-y-3">
                            {['Vietnam Airlines', 'VietJet Air', 'Bamboo Airways'].map(a => (
                                <label key={a} className="flex items-center space-x-3 group cursor-pointer"><input type="checkbox" className="ethereal-checkbox" defaultChecked /><span className="text-sm font-medium">{a}</span></label>
                            ))}
                        </div>
                    </div>
                </div>
            </aside>
        );

        const FlightResults = () => {
            const [sort, setSort] = React.useState('best');
            return (
                <section className="lg:col-span-3 flex flex-col space-y-6">
                    <div className="bg-surface-lowest rounded-[1rem] shadow-ethereal p-1 flex">
                        <button onClick={() => setSort('best')} className={`flex-1 py-3 text-sm font-bold rounded-[0.75rem] transition-colors ${sort === 'best' ? 'bg-surface-low text-primary-900' : 'text-on-surface/60'}`}>Tốt nhất<span className="block text-[10px] font-medium text-on-surface/50 mt-0.5">2h 10m • 1.25m đ</span></button>
                        <button onClick={() => setSort('cheapest')} className={`flex-1 py-3 text-sm font-bold rounded-[0.75rem] transition-colors ${sort === 'cheapest' ? 'bg-surface-low text-primary-900' : 'text-on-surface/60'}`}>Rẻ nhất<span className="block text-[10px] font-medium text-on-surface/50 mt-0.5">2h 10m • 950k đ</span></button>
                    </div>
                    <div className="flex flex-col space-y-4">
                        {flights.map(f => (
                            <div key={f.id} className="bg-surface-lowest rounded-[1.5rem] shadow-ethereal border border-surface-highest/30 overflow-hidden flex flex-col sm:flex-row group hover:-translate-y-1 transition-all">
                                <div className="flex-1 p-6 flex flex-col sm:flex-row items-center gap-6">
                                    <div className="flex items-center w-40 shrink-0">
                                        <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-xs" style={{backgroundColor: f.color}}>{f.logo}</div>
                                        <div className="ml-3"><p className="font-bold text-primary-900 text-sm">{f.airline}</p><p className="text-[10px] text-on-surface/50">{f.airlineCode}-245</p></div>
                                    </div>
                                    <div className="flex-1 flex items-center justify-between w-full">
                                        <div className="text-left"><p className="text-lg font-bold text-primary-900">{f.departTime}</p><p className="text-[10px] font-bold text-on-surface/40">HAN</p></div>
                                        <div className="flex-1 px-4 flex flex-col items-center"><p className="text-[10px] font-bold text-on-surface/40 mb-1">{f.duration}</p><div className="w-full h-[1.5px] bg-surface-highest relative"><IconPlane className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-surface-highest bg-white w-4" /></div><p className="text-[10px] font-bold text-secondary-500 mt-1">{f.type}</p></div>
                                        <div className="text-right"><p className="text-lg font-bold text-primary-900">{f.arriveTime}</p><p className="text-[10px] font-bold text-on-surface/40">PQC</p></div>
                                    </div>
                                </div>
                                <div className="bg-surface-bg/40 sm:w-[200px] p-6 flex flex-col justify-center border-t sm:border-t-0 sm:border-l border-surface-highest/20">
                                    <p className="text-2xl font-bold text-primary-900 text-right">{f.price.toLocaleString('vi-VN')} <span className="text-sm">đ</span></p>
                                    <button className="w-full mt-3 bg-secondary-500 text-white font-bold py-2.5 rounded-xl hover:bg-primary-900 transition-colors shadow-sm">Chọn</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const FloatingAIAssistant = () => (
            <div className="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-[200] flex flex-col items-end group cursor-pointer">
                <button className="relative w-14 h-14 md:w-16 md:h-16 bg-primary-900 rounded-full flex items-center justify-center text-tertiary-accent shadow-ethereal border border-white/10 overflow-hidden hover:scale-105 transition-all">
                    <div className="absolute inset-0 bg-tertiary-accent/20 blur-xl animate-pulse"></div>
                    <IconSparkles />
                </button>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
