<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Tours & Vé | Booking.com - The Ethereal Navigator</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration based on Design System -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            900: '#001629',
                            container: '#002b49'
                        },
                        secondary: {
                            500: '#00658d'
                        },
                        tertiary: {
                            accent: '#ffb870'
                        },
                        surface: {
                            bg: '#f6fafe',
                            low: '#f0f4f8',
                            highest: '#dfe3e7',
                            lowest: '#ffffff',
                        },
                        on: {
                            surface: '#171c1f'
                        }
                    },
                    boxShadow: {
                        'ethereal': '0 12px 32px rgba(23, 28, 31, 0.06)',
                        'dropdown': '0 20px 50px rgba(0, 22, 41, 0.15)',
                    },
                    borderRadius: {
                        'DEFAULT': '1rem',
                        'md': '1.5rem',
                        'xl': '3rem',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body { background-color: #f6fafe; color: #171c1f; -webkit-font-smoothing: antialiased; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hero-gradient { background: linear-gradient(135deg, #001629 0%, #002b49 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Icons ---
        const IconBed = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>;
        const IconPlane = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l5.5 4L5 15.5 3 15l-1 1 3 3 1-1-.5-2 3.5-3.5 4 5.5h1.2l.6-1.1c.4-.2.7-.6.6-1.1Z"/></svg>;
        const IconStore = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>;
        const IconMedical = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2s10 4.48 10 10Z"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>;
        const IconHelp = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
        const IconTaxi = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/><rect width="4" height="4" x="10" y="3" rx="1"/></svg>;
        const IconFilter = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
        const IconSearch = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const IconStar = (props) => <svg {...props} width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
        const IconClock = (props) => <svg {...props} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconGlobe = (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const IconSparkles = (props) => <svg {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden bg-surface-bg">
                    <HeaderAndHero />
                    
                    <main className="px-6 md:px-12 xl:px-24 max-w-7xl mx-auto relative z-10 pb-24 flex-1">
                        <TourListing />
                    </main>

                    <Footer />
                    <FloatingAIAssistant />
                </div>
            );
        };

        const HeaderAndHero = () => (
            <div className="hero-gradient text-white pb-24 rounded-b-[2.5rem] relative overflow-hidden">
                <div className="px-6 md:px-12 xl:px-24 py-5 flex items-center justify-between relative z-10">
                    <div className="text-2xl font-bold tracking-tight cursor-pointer" onClick={() => window.location.href='index.html'}>PQGO.com</div>
                    <div className="hidden lg:flex items-center space-x-6">
                        <button className="flex items-center space-x-1 hover:text-tertiary-accent transition-colors"><IconGlobe /><span>VN</span></button>
                        <div className="flex space-x-3 ml-2">
                            <button className="bg-surface-lowest text-primary-900 px-5 py-2.5 rounded-full font-bold hover:bg-tertiary-accent transition-all text-xs">Đăng ký</button>
                            <button className="border border-white/30 text-white px-5 py-2.5 rounded-full font-bold hover:bg-white/10 transition-all text-xs">Đăng nhập</button>
                        </div>
                    </div>
                </div>

                <div className="px-6 md:px-12 xl:px-24 pt-4 pb-8 flex space-x-2 overflow-x-auto hide-scrollbar relative z-10">
                    <NavPill icon={<IconBed />} text="Lưu trú" onClick={() => window.location.href='index.html'} />
                    <NavPill icon={<IconPlane />} text="Chuyến bay" />
                    <NavPill icon={<IconStore />} text="Cửa hàng" active onClick={() => window.location.href='shop.html'} />
                    <NavPill icon={<IconMedical />} text="Y tế" />
                    <NavPill icon={<IconHelp />} text="Hỗ trợ" />
                    <NavPill icon={<IconTaxi />} text="Taxi sân bay" onClick={() => window.location.href='taxisanbay.html'} />
                </div>

                <div className="px-6 md:px-12 xl:px-24 pt-8 pb-12 relative z-10">
                    <h1 className="text-4xl md:text-[3.5rem] font-bold leading-[110%] tracking-tight mb-4">Tours & Vé Tham Quan</h1>
                    <p className="text-xl md:text-[1.375rem] font-medium leading-[140%] text-white/80">Khám phá vạn trải nghiệm, triệu niềm vui tại Phú Quốc.</p>
                </div>
            </div>
        );

        const NavPill = ({ icon, text, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`
                flex items-center space-x-2 px-5 py-2.5 rounded-full whitespace-nowrap transition-all
                ${active 
                    ? 'border border-white/20 bg-white/10 backdrop-blur-md text-white font-semibold' 
                    : 'text-white/80 hover:bg-white/5 hover:text-white font-medium'
                }
            `}>
                {icon}
                <span>{text}</span>
            </button>
        );

        const TourListing = () => {
            const tours = [
                { id: 1, title: 'Tour 4 Đảo Kết Hợp Cáp Treo Hòn Thơm', loc: 'An Thới', price: '1.250.000đ', rating: '4.9', reviews: 1240, duration: '8 tiếng', img: 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=80', badge: 'Bán chạy' },
                { id: 2, title: 'Vé Combo VinWonders & Vinpearl Safari', loc: 'Gành Dầu', price: '1.350.000đ', rating: '4.8', reviews: 3500, duration: 'Cả ngày', img: 'https://images.unsplash.com/photo-1505993597083-3cb43130d31e?auto=format&fit=crop&w=800&q=80', badge: 'Tiết kiệm' },
                { id: 3, title: 'Ngắm Hoàng Hôn Trên Du Thuyền Buồm', loc: 'Dương Đông', price: '850.000đ', rating: '4.9', reviews: 820, duration: '4 tiếng', img: 'https://images.unsplash.com/photo-1516912481808-3b043c1ac812?auto=format&fit=crop&w=800&q=80', badge: 'Lãng mạn' },
                { id: 4, title: 'Khám Phá Rừng Quốc Gia & Làng Chài Rạch Vẹm', loc: 'Bắc Đảo', price: '750.000đ', rating: '4.7', reviews: 460, duration: '6 tiếng', img: 'https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=800&q=80' },
                { id: 5, title: 'Tour Lặn Bình Khí Tại Công Viên San Hô', loc: 'Hòn Thơm', price: '1.050.000đ', rating: '4.9', reviews: 156, duration: '3 tiếng', img: 'https://images.unsplash.com/photo-1544552866-d3ed42536cfd?auto=format&fit=crop&w=800&q=80' },
                { id: 6, title: 'Vé Show Diễn Tinh Hoa Việt Nam', loc: 'Grand World', price: '300.000đ', rating: '4.9', reviews: 2100, duration: '1.5 tiếng', img: 'https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?auto=format&fit=crop&w=800&q=80', badge: 'Must See' },
            ];

            return (
                <div className="space-y-8 -mt-10">
                    {/* Filter Bar */}
                    <div className="bg-white/90 backdrop-blur-xl shadow-dropdown rounded-md p-2 flex flex-col md:flex-row gap-2 border border-white/60">
                        <div className="flex-1 relative">
                            <IconSearch className="absolute left-5 top-1/2 -translate-y-1/2 text-on-surface/30 z-20" />
                            <input type="text" placeholder="Tìm tours, hoạt động, vé..." className="w-full bg-surface-low rounded-[1rem] pl-14 pr-4 h-16 outline-none border-2 border-transparent focus:border-secondary-500/20 transition-all font-semibold text-primary-900" />
                        </div>
                        <div className="flex gap-2">
                            <button className="flex items-center space-x-3 px-8 h-16 rounded-[1rem] bg-surface-low hover:bg-surface-highest transition-all text-primary-900 font-bold">
                                <IconFilter className="text-secondary-500" />
                                <span>Lọc</span>
                            </button>
                            <button className="flex items-center space-x-3 px-10 h-16 rounded-[1rem] bg-primary-900 text-white font-bold hover:bg-secondary-500 transition-all shadow-md">
                                <span>Tìm kiếm</span>
                            </button>
                        </div>
                    </div>

                    {/* Results Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {tours.map(t => (
                            <div key={t.id} className="bg-white rounded-[2rem] overflow-hidden shadow-ethereal hover:shadow-dropdown transition-all duration-500 group flex flex-col border border-surface-highest/20 cursor-pointer">
                                <div className="h-56 relative overflow-hidden">
                                    {t.badge && (
                                        <div className="absolute top-4 left-4 z-10 bg-white/90 backdrop-blur-md text-primary-900 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border border-white/50">
                                            {t.badge}
                                        </div>
                                    )}
                                    <img src={t.img} alt={t.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                </div>
                                <div className="p-6 flex-1 flex flex-col justify-between">
                                    <div>
                                        <div className="flex items-center justify-between mb-2">
                                            <span className="text-[10px] font-bold text-secondary-500 uppercase tracking-widest">{t.loc}</span>
                                            <div className="flex items-center space-x-1">
                                                <span className="text-[#f59e0b]"><IconStar /></span>
                                                <span className="text-xs font-bold text-primary-900">{t.rating}</span>
                                                <span className="text-[10px] text-on-surface/40 font-medium">({t.reviews})</span>
                                            </div>
                                        </div>
                                        <h3 className="text-lg font-bold text-primary-900 mb-4 line-clamp-2 leading-tight group-hover:text-secondary-500 transition-colors">{t.title}</h3>
                                        <div className="flex items-center space-x-2 text-on-surface/60 text-xs font-medium mb-6">
                                            <IconClock />
                                            <span>Thời lượng: {t.duration}</span>
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between pt-5 border-t border-surface-low mt-auto">
                                        <div className="flex flex-col">
                                            <span className="text-[10px] font-bold text-on-surface/30 uppercase tracking-widest leading-none mb-1">Giá từ</span>
                                            <span className="text-xl font-bold text-primary-900">{t.price}</span>
                                        </div>
                                        <button className="bg-primary-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-secondary-500 transition-all shadow-md text-sm">Đặt ngay</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const Footer = () => (
            <footer className="bg-primary-900 text-white rounded-t-[3rem] pt-16 pb-10 mt-6 relative overflow-hidden">
                <div className="px-6 md:px-12 xl:px-24 max-w-7xl mx-auto relative z-10">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                        <div>
                            <h4 className="font-bold text-tertiary-accent text-[10px] uppercase tracking-widest mb-6">Tours & Vé</h4>
                            <ul className="space-y-3 text-white/50 text-sm font-semibold">
                                <li className="hover:text-white cursor-pointer">Tour trong ngày</li>
                                <li className="hover:text-white cursor-pointer">Vé tham quan</li>
                                <li className="hover:text-white cursor-pointer">Hoạt động dưới nước</li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-bold text-tertiary-accent text-[10px] uppercase tracking-widest mb-6">Cửa hàng</h4>
                            <ul className="space-y-3 text-white/50 text-sm font-semibold">
                                <li className="hover:text-white cursor-pointer">Nhà hàng & Bar</li>
                                <li className="hover:text-white cursor-pointer">Sim 4G & eSIM</li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-bold text-tertiary-accent text-[10px) uppercase tracking-widest mb-6">Hỗ trợ</h4>
                            <ul className="space-y-3 text-white/50 text-sm font-semibold">
                                <li className="hover:text-white cursor-pointer">Trung tâm trợ giúp</li>
                                <li className="hover:text-white cursor-pointer">Chính sách hoàn tiền</li>
                            </ul>
                        </div>
                        <div>
                            <div className="text-2xl font-bold tracking-tight mb-4">PQGO.com</div>
                            <p className="text-xs text-white/30 leading-relaxed uppercase font-bold tracking-widest">© 2026 The Ethereal Navigator</p>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const FloatingAIAssistant = () => (
            <div className="fixed bottom-10 right-10 z-[100] group cursor-pointer flex flex-col items-end">
                <div className="bg-white/90 backdrop-blur-xl shadow-dropdown px-5 py-3 rounded-2xl rounded-br-none mb-3 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-4 group-hover:translate-y-0 border border-white/60 pointer-events-none">
                    <p className="text-sm font-bold text-primary-900 mb-0.5">Trợ lý AI</p>
                    <p className="text-xs text-on-surface/70">Tôi có thể tìm tour lặn san hô tốt nhất?</p>
                </div>
                <button className="relative w-16 h-16 bg-primary-900 rounded-full flex items-center justify-center text-tertiary-accent shadow-dropdown border border-white/10 overflow-hidden hover:scale-105 transition-all">
                    <div className="absolute inset-0 bg-tertiary-accent/20 blur-xl animate-pulse"></div>
                    <IconSparkles />
                </button>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
