        const HeaderInfo = ({ data }) => (
            <section className="border-b border-surface-highest/50 pb-6 md:pb-8">
                <h1 className="text-3xl md:text-4xl font-bold text-primary-900 tracking-tight leading-tight mb-4">{data.name}</h1>
                <div className="flex flex-wrap items-center gap-y-4 gap-x-6 text-sm font-medium">
                    <div className="flex items-center space-x-1 text-[#ffb870]">
                        <IconStar filled /><IconStar filled /><IconStar filled /><IconStar filled /><IconStar filled />
                        <span className="text-primary-900 font-bold ml-1">{data.rating}</span>
                        <span className="text-on-surface/50 font-medium ml-1">({data.reviews} đánh giá)</span>
                    </div>
                    <div className="flex items-center text-secondary-500 font-bold">
                        <IconUtensils className="mr-2" /> {data.cuisine}
                    </div>
                    <div className="flex items-center text-on-surface/60">
                        <IconClock className="mr-2" /> {data.openHours}
                    </div>
                    <div className="flex items-center text-on-surface/40">
                        <IconMapPin className="mr-2" /> {data.location}
                    </div>
                </div>
            </section>
        );

        const AboutSection = ({ description, tags }) => (
            <section>
                <h2 className="text-[1.5rem] md:text-[1.75rem] font-bold text-primary-900 tracking-tight mb-4">Về không gian ẩm thực</h2>
                <p className="text-on-surface/70 leading-relaxed text-sm md:text-base mb-6">{description}</p>
                <div className="flex flex-wrap gap-2">
                    {tags.map(tag => (
                        <span key={tag} className="bg-surface-low text-primary-900/70 font-bold text-[10px] uppercase tracking-widest px-3 py-1.5 rounded-lg border border-surface-highest/50">
                            {tag}
                        </span>
                    ))}
                </div>
            </section>
        );

        const MenuSection = ({ menu, onSeeAll }) => (
            <section>
                <div className="flex justify-between items-end mb-6">
                    <h2 className="text-[1.5rem] md:text-[1.75rem] font-bold text-primary-900 tracking-tight">Thực đơn đặc trưng</h2>
                    <button onClick={onSeeAll} className="text-xs md:text-sm font-bold text-secondary-500 hover:text-primary-900 transition-colors">Xem toàn bộ menu →</button>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    {menu.map((item, idx) => (
                        <div key={idx} className="bg-surface-lowest p-3 rounded-[1.5rem] shadow-ethereal-sm border border-surface-highest/20 group flex flex-col hover:shadow-ethereal transition-all">
                            <div className="h-32 rounded-xl overflow-hidden mb-3 relative">
                                <img src={item.img} alt={item.name} className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                            </div>
                            <div className="flex flex-col flex-1">
                                <h3 className="font-bold text-primary-900 text-sm leading-tight mb-1">{item.name}</h3>
                                <p className="text-[11px] text-on-surface/50 line-clamp-2 mb-3">{item.desc}</p>
                                <div className="mt-auto font-bold text-secondary-500 text-sm">{item.price}</div>
                            </div>
                        </div>
                    ))}
                </div>
            </section>
        );

        const FullMenuModal = ({ menu, onClose }) => (
            <ModalOverlay title="Thực đơn toàn phần" onClose={onClose}>
                {menu.map((cat, idx) => (
                    <div key={idx} className="mb-12 last:mb-0">
                        <h3 className="text-[10px] font-bold uppercase tracking-[0.2em] text-secondary-500 mb-8 border-b border-secondary-500/10 pb-2">{cat.category}</h3>
                        <div className="grid grid-cols-1 gap-8">
                            {cat.items.map((item, i) => (
                                <div key={i} className="flex items-center group">
                                    <div className="w-20 h-20 rounded-2xl overflow-hidden shrink-0 shadow-sm mr-6 relative border border-surface-highest/20">
                                        <img src={item.img} alt={item.name} className="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                    </div>
                                    <div className="flex-1 pr-4">
                                        <h4 className="font-bold text-primary-900 text-base group-hover:text-secondary-500 transition-colors mb-1">{item.name}</h4>
                                        <p className="text-xs text-on-surface/50 leading-relaxed line-clamp-2">{item.desc}</p>
                                    </div>
                                    <div className="font-bold text-primary-900 text-sm whitespace-nowrap bg-surface-low px-3 py-1 rounded-lg">{item.price}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                ))}
            </ModalOverlay>
        );

        const ReviewsSection = ({ reviews, onSeeAll, onWriteReview, isLoggedIn }) => (
            <section className="pt-8 border-t border-surface-highest/50">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                    <div>
                        <h2 className="text-[1.5rem] md:text-[1.75rem] font-bold text-primary-900 tracking-tight">Đánh giá thực khách</h2>
                        <div className="flex items-center space-x-2 mt-1">
                            <div className="bg-primary-900 text-white font-bold px-2 py-0.5 rounded text-sm">4.9</div>
                            <div className="text-[10px] font-bold text-primary-900 uppercase tracking-widest">Tuyệt vời</div>
                        </div>
                    </div>
                    <div className="flex space-x-3">
                        <button 
                            onClick={onWriteReview}
                            className={`flex items-center space-x-2 px-5 py-2.5 rounded-xl font-bold text-sm transition-all shadow-sm active:scale-95 ${isLoggedIn ? 'bg-secondary-500 text-white hover:bg-primary-900' : 'bg-surface-low text-primary-900 hover:bg-surface-highest'}`}
                        >
                            <IconPen /> <span>{isLoggedIn ? 'Viết đánh giá của bạn' : 'Đăng nhập để viết đánh giá'}</span>
                        </button>
                        <button onClick={onSeeAll} className="text-xs md:text-sm font-bold text-secondary-500 hover:text-primary-900 transition-colors px-2">Tất cả đánh giá →</button>
                    </div>
                </div>
                <div className="space-y-6">
                    {reviews.slice(0, 2).map((rev, i) => (
                        <div key={i} className="bg-surface-lowest p-6 rounded-[1.5rem] shadow-ethereal-sm border border-surface-highest/10">
                            <div className="flex justify-between items-start mb-3">
                                <div className="flex items-center space-x-3">
                                    <div className="w-10 h-10 rounded-full bg-secondary-500/10 flex items-center justify-center font-bold text-secondary-500">{rev.user[0]}</div>
                                    <div><p className="font-bold text-primary-900 text-sm">{rev.user}</p><p className="text-[10px] text-on-surface/40 uppercase font-bold tracking-widest">{rev.date}</p></div>
                                </div>
                                <div className="flex text-[#ffb870] scale-75">{[...Array(5)].map((_, j) => <IconStar key={j} filled={j < Math.floor(rev.rating)} />)}</div>
                            </div>
                            <p className="text-sm text-on-surface/70 leading-relaxed italic">"{rev.comment}"</p>
                        </div>
                    ))}
                </div>
            </section>
        );

        const AllReviewsModal = ({ reviews, onClose }) => (
            <ModalOverlay title="Đánh giá từ khách hàng" onClose={onClose}>
                <div className="space-y-6">
                    {reviews.map((rev, i) => (
                        <div key={i} className="bg-surface-low/30 p-6 rounded-[1.5rem] border border-surface-highest/20">
                            <div className="flex justify-between items-start mb-3">
                                <div className="flex items-center space-x-3">
                                    <div className="w-10 h-10 rounded-full bg-primary-900 text-white flex items-center justify-center font-bold">{rev.user[0]}</div>
                                    <div><p className="font-bold text-primary-900 text-sm">{rev.user}</p><p className="text-[10px] text-on-surface/40 uppercase font-bold tracking-widest">{rev.date}</p></div>
                                </div>
                                <div className="flex items-center space-x-1 bg-white px-2 py-1 rounded-lg shadow-sm border border-surface-highest/40">
                                    <span className="text-xs font-bold text-primary-900">{rev.rating}</span>
                                    <IconStar filled className="text-[#ffb870] w-3 h-3" />
                                </div>
                            </div>
                            <p className="text-sm text-on-surface/70 leading-relaxed">"{rev.comment}"</p>
                        </div>
                    ))}
                </div>
            </ModalOverlay>
        );

        const WriteReviewModal = ({ onClose }) => {
            const [rating, setRating] = React.useState(0);
            return (
                <ModalOverlay title="Viết đánh giá của bạn" onClose={onClose}>
                    <div className="space-y-8">
                        <div className="text-center">
                            <p className="text-sm font-bold text-primary-900 mb-4">Bạn đánh giá trải nghiệm tại đây như thế nào?</p>
                            <div className="flex justify-center space-x-3">
                                {[1, 2, 3, 4, 5].map(i => (
                                    <button key={i} onClick={() => setRating(i)} className={`transition-all ${i <= rating ? 'text-[#ffb870] scale-125' : 'text-surface-highest hover:text-secondary-500'}`}>
                                        <svg width="40" height="40" viewBox="0 0 24 24" fill={i <= rating ? "currentColor" : "none"} stroke="currentColor" strokeWidth="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-surface-low rounded-[1.5rem] p-6 group focus-within:bg-white focus-within:shadow-ethereal transition-all">
                            <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-2">Chia sẻ chi tiết trải nghiệm</label>
                            <textarea 
                                placeholder="Hãy mô tả về món ăn, không gian và phục vụ..."
                                className="w-full bg-transparent border-none outline-none text-sm font-medium text-primary-900 min-h-[150px] resize-none"
                            ></textarea>
                        </div>

                        <div className="flex flex-col space-y-3">
                            <button onClick={onClose} className="w-full bg-primary-900 text-white font-bold py-4 rounded-2xl hover:bg-secondary-500 transition-all shadow-md">Gửi đánh giá</button>
                            <button onClick={onClose} className="w-full py-3 text-xs font-bold text-on-surface/40 hover:text-primary-900 transition-colors uppercase tracking-widest">Hủy bỏ</button>
                        </div>
                    </div>
                </ModalOverlay>
            );
        };

        const PromptLoginModal = ({ onLogin, onClose }) => (
            <ModalOverlay title="Yêu cầu đăng nhập" onClose={onClose}>
                <div className="text-center py-6">
                    <div className="w-20 h-20 rounded-full bg-surface-low flex items-center justify-center mx-auto mb-6 text-secondary-500">
                        <IconUser />
                    </div>
                    <h3 className="text-xl font-bold text-primary-900 mb-2">Bạn cần đăng nhập để viết đánh giá</h3>
                    <p className="text-sm text-on-surface/50 mb-8 max-w-sm mx-auto">Vui lòng đăng nhập vào tài khoản Booking.com để chia sẻ trải nghiệm của bạn với cộng đồng.</p>
                    <button onClick={onLogin} className="w-full bg-primary-900 text-white font-bold py-4 rounded-2xl hover:bg-secondary-500 transition-all shadow-md mb-4">Đăng nhập ngay</button>
                    <button onClick={onClose} className="text-xs font-bold text-secondary-500 hover:underline">Quay lại trang chi tiết</button>
                </div>
            </ModalOverlay>
        );

        // --- Form Pickers ---

        const DatePickerModal = ({ onClose }) => (
            <ModalOverlay title="Chọn ngày đặt bàn" onClose={onClose}>
                <div className="grid grid-cols-7 gap-2 text-center mb-4">
                    {['CN','T2','T3','T4','T5','T6','T7'].map(d => <div key={d} className="text-[10px] font-bold text-on-surface/30 uppercase">{d}</div>)}
                </div>
                <div className="grid grid-cols-7 gap-2">
                    {[...Array(19)].map((_, i) => <div key={i} />)}
                    {[...Array(12)].map((_, i) => (
                        <button key={i} onClick={onClose} className={`h-10 rounded-xl flex items-center justify-center font-bold text-sm ${i+19 === 19 ? 'bg-secondary-500 text-white shadow-md' : 'hover:bg-surface-low text-primary-900'}`}>{i+19}</button>
                    ))}
                </div>
            </ModalOverlay>
        );

        const TimePickerModal = ({ onClose }) => {
            const times = ["17:30", "18:00", "18:30", "19:00", "19:30", "20:00", "20:30", "21:00"];
            return (
                <ModalOverlay title="Chọn giờ đến" onClose={onClose}>
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        {times.map(t => (
                            <button key={t} onClick={onClose} className={`py-4 rounded-2xl font-bold text-sm border border-surface-highest/30 transition-all ${t === "19:30" ? 'bg-primary-900 text-white shadow-md' : 'bg-surface-low hover:bg-surface-highest text-primary-900'}`}>{t}</button>
                        ))}
                    </div>
                </ModalOverlay>
            );
        };

        const TablePickerModal = ({ tableCount, setTableCount, onClose }) => {
            return (
                <ModalOverlay title="Chọn số bàn" onClose={onClose}>
                    <div className="space-y-8">
                        <div className="flex items-center justify-between">
                            <div>
                                <p className="font-bold text-primary-900 text-base">Số lượng bàn</p>
                                <p className="text-xs text-on-surface/40">Bàn tiêu chuẩn (2-6 người)</p>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button onClick={() => tableCount > 1 && setTableCount(tableCount-1)} className="w-10 h-10 rounded-full border border-surface-highest flex items-center justify-center hover:bg-surface-low text-secondary-500 transition-all"><IconMinus /></button>
                                <span className="font-bold text-lg text-primary-900 w-4 text-center">{tableCount}</span>
                                <button onClick={() => setTableCount(tableCount+1)} className="w-10 h-10 rounded-full border border-surface-highest flex items-center justify-center hover:bg-surface-low text-secondary-500 transition-all"><IconPlus /></button>
                            </div>
                        </div>

                        <div className="p-4 bg-tertiary-accent/10 rounded-xl border border-tertiary-accent/20 flex items-start space-x-3">
                            <div className="text-primary-900 shrink-0 mt-0.5"><IconInfo /></div>
                            <p className="text-xs text-primary-900 font-medium leading-relaxed italic">
                                Lời khuyên: Một bàn tiêu chuẩn tại nhà hàng có thể ngồi được tối đa 6 người. Nếu quý khách có đoàn 12 người, nên chọn 2 bàn để đảm bảo không gian thoải mái nhất.
                            </p>
                        </div>
                    </div>
                    <button onClick={onClose} className="w-full mt-10 bg-primary-900 text-white font-bold py-4 rounded-2xl hover:bg-secondary-500 transition-all shadow-md">Xác nhận số bàn</button>
                </ModalOverlay>
            );
        };

        const BookingForm = ({ tableCount, onOpenModal }) => (
            <div className="lg:sticky lg:top-8 bg-surface-lowest rounded-[2rem] p-6 sm:p-8 shadow-dropdown border border-surface-highest/30">
                <h3 className="text-xl font-bold text-primary-900 tracking-tight mb-6 text-center">Đặt bàn ngay</h3>
                <div className="space-y-4">
                    <div className="space-y-3 mb-6 pb-6 border-b border-surface-low">
                        <div className="bg-surface-low p-3 px-4 rounded-2xl group border border-transparent focus-within:border-secondary-500/30 transition-all">
                            <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Tên người đặt bàn</label>
                            <div className="flex items-center space-x-3"><IconUser className="text-on-surface/30" /><input type="text" placeholder="Nhập họ và tên của bạn" className="bg-transparent border-none outline-none w-full text-primary-900 font-bold text-sm" /></div>
                        </div>
                        <div className="bg-surface-low p-3 px-4 rounded-2xl group border border-transparent focus-within:border-secondary-500/30 transition-all">
                            <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Số điện thoại</label>
                            <div className="flex items-center space-x-3"><IconPhone className="text-on-surface/30" /><input type="tel" placeholder="Nhập số điện thoại của bạn" className="bg-transparent border-none outline-none w-full text-primary-900 font-bold text-sm" /></div>
                        </div>
                        <div className="bg-surface-low p-3 px-4 rounded-2xl group border border-transparent focus-within:border-secondary-500/30 transition-all">
                            <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Địa chỉ Email</label>
                            <div className="flex items-center space-x-3"><IconMail className="text-on-surface/30" /><input type="email" placeholder="Nhập địa chỉ email của bạn" className="bg-transparent border-none outline-none w-full text-primary-900 font-bold text-sm" /></div>
                        </div>
                    </div>
                    <div onClick={() => onOpenModal('date')} className="bg-surface-low p-3 px-4 rounded-2xl group border border-transparent hover:border-secondary-500/20 transition-all cursor-pointer">
                        <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Ngày đặt</label>
                        <div className="flex items-center space-x-2 text-primary-900 font-bold text-sm"><IconCalendar /> <span>Hôm nay, 19 Tháng 4</span></div>
                    </div>
                    <div className="flex space-x-3">
                        <div onClick={() => onOpenModal('time')} className="flex-1 bg-surface-low p-3 px-4 rounded-2xl group border border-transparent hover:border-secondary-500/20 transition-all cursor-pointer">
                            <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Giờ đến</label>
                            <div className="flex items-center space-x-2 text-primary-900 font-bold text-sm"><IconClock /> <span>19:30</span></div>
                        </div>
                        <div onClick={() => onOpenModal('guests')} className="flex-1 bg-surface-low p-3 px-4 rounded-2xl group border border-transparent hover:border-secondary-500/20 transition-all cursor-pointer">
                            <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Số bàn</label>
                            <div className="flex items-center space-x-2 text-primary-900 font-bold text-sm"><IconTable /> <span>{tableCount} Bàn</span></div>
                        </div>
                    </div>
                </div>
                <button className="w-full bg-primary-900 text-white font-bold py-4 rounded-2xl hover:bg-secondary-500 transition-all shadow-md text-sm mt-8 active:scale-95">Xác nhận đặt bàn</button>
            </div>
        );

        const FloatingAIAssistant = () => (
            <div className="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-[200] group cursor-pointer flex flex-col items-end">
                <button className="relative w-16 h-16 bg-primary-900 rounded-full flex items-center justify-center text-tertiary-accent shadow-dropdown border border-white/10 overflow-hidden hover:scale-105 transition-all">
                    <div className="absolute inset-0 bg-tertiary-accent/20 blur-xl animate-pulse"></div><IconSparkles />
                </button>
            </div>
        );

        const Footer = () => (
            <footer className="bg-primary-900 text-white rounded-t-[2.5rem] md:rounded-t-[3rem] pt-12 pb-8 mt-16 relative overflow-hidden text-center px-4">
                <div className="absolute top-[-100px] right-[-100px] w-96 h-96 bg-secondary-500/10 rounded-full blur-[100px] pointer-events-none"></div>
                <p className="text-[9px] md:text-[10px] font-bold text-white/30 uppercase tracking-widest relative z-10">© 1996–2026 Booking.com™ - The Ethereal Navigator</p>
            </footer>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
