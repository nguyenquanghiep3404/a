<!DOCTYPE html>

                    boxShadow: {
                        'ethereal': '0 12px 32px rgba(23, 28, 31, 0.06)',

    <style>
        body { background-color: #f6fafe; color: #171c1f; -webkit-font-smoothing: antialiased; }

<body>

        const App = () => {
            return (

                    <HeaderAndHero />
                    
                    <main className="px-6 md:px-12 xl:px-24 max-w-7xl mx-auto relative z-10 pb-24 flex-1">
                        <SimListing />

                    : 'text-white/80 hover:bg-white/5 hover:text-white font-medium'
                }
            `}>

                <span>{text}</span>
            </button>
        );

                            </div>
                        </div>
                        <div className="flex items-center space-x-4 border-l-0 md:border-l border-surface-highest/40 md:pl-6">
                            <div className="w-12 h-12 rounded-full bg-secondary-500/10 flex items-center justify-center text-secondary-500">
                                <IconCheck />
                            </div>
                            <div>
                                <h4 className="font-bold text-primary-900 leading-tight">Giao Nhanh</h4>
                                <p className="text-xs text-on-surface/50 font-medium">Nội thành trong 30-60p</p>
                            </div>
                        </div>
                        <div className="flex items-center space-x-4 border-l-0 md:border-l border-surface-highest/40 md:pl-6">

                                <IconHelp />
                            </div>

                            </div>
                        </div>

                                )}
                                {p.badge && (
                                    <div className="absolute top-0 right-10 -translate-y-1/2 bg-tertiary-accent text-primary-900 px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg">{p.badge}</div>
                                )}

                                    <span className={`inline-block px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest mb-4 ${p.type === 'eSIM' ? 'bg-secondary-500/10 text-secondary-500' : 'bg-primary-900/10 text-primary-900'}`}>{p.type}</span>
                                    <h3 className="text-2xl font-bold text-primary-900 mb-2">{p.title}</h3>
                                    <p className="text-secondary-500 font-bold text-lg">{p.data}</p>
                                </div>
                                <div className="space-y-3 mb-10 flex-1">
                                    {p.features.map((f, i) => (
                                        <div key={i} className="flex items-center space-x-3 text-sm font-semibold text-on-surface/70">
                                            <IconCheck className="text-green-500 flex-shrink-0" />
                                            <span>{f}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="pt-6 border-t border-surface-low flex items-center justify-between mt-auto">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-bold text-on-surface/30 uppercase tracking-widest mb-1">Giá gói</span>
                                        <span className="text-2xl font-bold text-primary-900">{p.price}</span>
                                    </div>
                                    <button className="bg-primary-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-secondary-500 transition-all shadow-md">Đặc mua</button>
                                </div>
                            </div>

                    <div className="bg-primary-900 rounded-[3rem] p-10 text-white relative overflow-hidden">

                        <div className="relative z-10 flex flex-col lg:flex-row items-center justify-between gap-8">

                                <div className="space-y-6">
                                    <div className="flex items-start space-x-4">

                                        <p className="text-sm text-white/70">Chọn gói cước và cung cấp địa chỉ khách sạn hoặc điểm hẹn tại Phú Quốc.</p>

                                    <div className="flex items-start space-x-4">
                                        <div className="w-8 h-8 rounded-full border border-white/30 flex items-center justify-center shrink-0 font-bold">3</div>
                                        <p className="text-sm text-white/70">Nhận Sim, kiểm tra kết nối tại chỗ và thanh toán. Đối với eSIM, mã QR sẽ gửi ngay qua tin nhắn.</p>
                                    </div>
                                </div>
                            </div>

                                <h4 className="text-xl font-bold mb-2">Cần hỗ trợ ngay?</h4>
                                <p className="text-sm text-white/60 mb-6">Liên hệ trực tiếp với tổng đài viên để được tư vấn gói cước phù hợp nhất.</p>

        const Footer = () => (

                <div className="px-6 md:px-12 xl:px-24 max-w-7xl mx-auto relative z-10">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                        <div>
                            <h4 className="font-bold text-tertiary-accent text-[10px] uppercase tracking-widest mb-6">Dịch vụ</h4>
                            <ul className="space-y-3 text-white/50 text-sm font-semibold">
                                <li className="hover:text-white cursor-pointer">Sim vật lý</li>
                                <li className="hover:text-white cursor-pointer">eSIM kích hoạt ngay</li>
                                <li className="hover:text-white cursor-pointer">Giao hàng miễn phí</li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-bold text-tertiary-accent text-[10px] uppercase tracking-widest mb-6">Kết nối</h4>
                            <ul className="space-y-3 text-white/50 text-sm font-semibold">
                                <li className="hover:text-white cursor-pointer">Trung tâm hỗ trợ</li>
                                <li className="hover:text-white cursor-pointer">Chính sách bảo hành</li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-bold text-tertiary-accent text-[10px] uppercase tracking-widest mb-6">Hỗ trợ</h4>
                            <ul className="space-y-3 text-white/50 text-sm font-semibold">
                                <li className="hover:text-white cursor-pointer">Hotline: 1900 8888</li>
                                <li className="hover:text-white cursor-pointer">Zalo: 090xxxxxxx</li>
                            </ul>
                        </div>
                        <div className="flex flex-col">
                            <div className="text-2xl font-bold tracking-tight mb-4 text-tertiary-accent">PQGO.com</div>
                            <p className="text-xs text-white/20 font-bold uppercase tracking-[0.2em]">The Ethereal Navigator</p>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const FloatingAIAssistant = () => (
            <div className="fixed bottom-10 right-10 z-[100] group cursor-pointer flex flex-col items-end">
                <div className="bg-white/90 backdrop-blur-xl shadow-dropdown px-5 py-3 rounded-2xl rounded-br-none mb-3 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-4 group-hover:translate-y-0 border border-white/60 pointer-events-none text-right">
                    <p className="text-sm font-bold text-primary-900 mb-0.5">Trợ lý AI</p>
                    <p className="text-xs text-on-surface/70">Máy tôi có dùng được eSIM không?</p>
                </div>
                <button className="relative w-16 h-16 bg-primary-900 rounded-full flex items-center justify-center text-tertiary-accent shadow-dropdown border border-white/10 overflow-hidden hover:scale-105 transition-all">
                    <div className="absolute inset-0 bg-tertiary-accent/20 blur-xl animate-pulse"></div>
                    <IconSparkles />
                </button>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
