<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyến bay | Booking.com - The Ethereal Navigator</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration based on DESIGN.md -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            900: '#001629',
                            container: '#002b49'
                        },
                        secondary: {
                            500: '#00658d'
                        },
                        tertiary: {
                            accent: '#ffb870'
                        },
                        surface: {
                            bg: '#f6fafe',
                            low: '#f0f4f8',
                            highest: '#dfe3e7',
                            lowest: '#ffffff',
                        },
                        on: {
                            surface: '#171c1f'
                        }
                    },
                    boxShadow: {
                        'ethereal': '0 12px 32px rgba(23, 28, 31, 0.06)',
                        'dropdown': '0 20px 50px rgba(0, 22, 41, 0.15)',
                    },
                    borderRadius: {
                        'DEFAULT': '1rem',
                        'md': '1.5rem',
                        'xl': '3rem',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body {
            background-color: #f6fafe; /* surface-bg */
            color: #171c1f; /* on-surface */
            -webkit-font-smoothing: antialiased;
        }
        
        /* Hide scrollbar for horizontal scrolling but keep functionality */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .animate-in {
            animation: fadeInScale 0.2s ease-out forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Icons (Inline SVGs) ---
        const IconBed = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>;
        const IconPlane = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l5.5 4L5 15.5 3 15l-1 1 3 3 1-1-.5-2 3.5-3.5 4 5.5h1.2l.6-1.1c.4-.2.7-.6.6-1.1Z"/></svg>;
        const IconPlaneTakeoff = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 22h20"/><path d="M6.36 13.4 22 9.22l-1.42-3.85L5 9.77V7l-2 1v5.4l1.36.4L7 16l-3.32-.98-1.58.54 4.26 2.84"/></svg>;
        const IconPlaneLanding = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 22h20"/><path d="m3.98 9.22 15.64 4.4L21 9.77V7l-2 1v5.4l-1.36.4L14 16l3.32-.98 1.58.54-4.26 2.84"/></svg>;
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconGlobe = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>;
        const IconMinus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
        const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const IconStore = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>;
        const IconMedical = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2s10 4.48 10 10Z"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>;
        const IconHelp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
        const IconTaxi = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/><rect width="4" height="4" x="10" y="3" rx="1"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden">
                    <HeaderAndHero />
                    
                    <main className="px-6 md:px-12 xl:px-24 max-w-7xl mx-auto -mt-10 relative z-10 pb-20 flex-1">
                        <FlightSearchModule />
                        <PopularRoutes />
                        <FlightOffersSection />
                        <FlightFeatures />
                        <TrendingDestinations />
                    </main>

                    <Footer />
                    <FloatingAIAssistant />
                </div>
            );
        };

        // --- Components ---

        const FloatingAIAssistant = () => {
            return (
                <div className="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-[200] flex flex-col items-end group cursor-pointer">
                    <div className="bg-white/90 backdrop-blur-xl shadow-ethereal px-5 py-3 rounded-2xl rounded-br-none mb-3 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-4 group-hover:translate-y-0 border border-white/60 pointer-events-none">
                        <p className="text-sm font-bold text-primary-900 mb-0.5">Trợ lý AI Ethereal</p>
                        <p className="text-xs text-on-surface/70">Tìm chuyến bay rẻ nhất hôm nay?</p>
                    </div>
                    
                    <button className="relative w-14 h-14 md:w-16 md:h-16 bg-primary-900 rounded-full flex items-center justify-center text-tertiary-accent shadow-ethereal hover:scale-105 hover:-translate-y-1 transition-all duration-300 group-hover:shadow-[0_20px_40px_rgba(0,22,41,0.2)] border border-white/10 overflow-hidden">
                        <div className="absolute inset-0 bg-tertiary-accent/20 blur-xl animate-pulse"></div>
                        <IconSparkles />
                    </button>
                </div>
            );
        };

        const HeaderAndHero = () => {
            const [showLangModal, setShowLangModal] = React.useState(false);

            const languages = [
                { code: 'vi', name: 'Tiếng Việt', region: 'Việt Nam', active: true },
                { code: 'en-US', name: 'English (US)', region: 'United States' },
                { code: 'en-GB', name: 'English (UK)', region: 'United Kingdom' },
                { code: 'zh', name: '简体中文', region: 'Trung Quốc' },
                { code: 'ja', name: '日本語', region: 'Nhật Bản' },
                { code: 'ko', name: '한국어', region: 'Hàn Quốc' },
                { code: 'th', name: 'ภาษาไทย', region: 'Thái Lan' },
                { code: 'fr', name: 'Français', region: 'Pháp' },
                { code: 'de', name: 'Deutsch', region: 'Đức' },
                { code: 'es', name: 'Español', region: 'Tây Ban Nha' },
                { code: 'ru', name: 'Русский', region: 'Nga' },
                { code: 'it', name: 'Italiano', region: 'Ý' },
            ];

            return (
                <div className="bg-gradient-to-br from-primary-900 to-primary-container text-white pb-24 rounded-b-3xl">
                    <div className="px-6 md:px-12 xl:px-24 py-5 flex items-center justify-between">
                        <div className="text-2xl font-bold tracking-tight cursor-pointer">Booking.com</div>
                        
                        <div className="hidden lg:flex items-center space-x-6 font-medium text-sm">
                            <button 
                                onClick={() => setShowLangModal(true)}
                                className="flex items-center space-x-1 hover:text-tertiary-accent transition-colors"
                            >
                                <IconGlobe /><span>VN</span>
                            </button>
                            <div className="flex space-x-3 ml-2">
                                <button className="bg-surface-lowest text-secondary-500 px-5 py-2 rounded-full font-semibold hover:bg-surface-low transition-colors">Đăng ký</button>
                                <button className="bg-surface-lowest text-secondary-500 px-5 py-2 rounded-full font-semibold hover:bg-surface-low transition-colors">Đăng nhập</button>
                            </div>
                        </div>
                    </div>

                    {/* Language Modal */}
                    {showLangModal && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 sm:p-6 animate-in fade-in duration-200">
                            <div className="absolute inset-0 bg-primary-900/60 backdrop-blur-sm" onClick={() => setShowLangModal(false)}></div>
                            <div className="relative bg-white/95 backdrop-blur-2xl w-full max-w-4xl rounded-[2rem] shadow-[0_32px_64px_rgba(0,22,41,0.2)] flex flex-col max-h-[90vh] overflow-hidden border border-white/50">
                                <div className="flex items-center justify-between p-6 border-b border-surface-highest/30">
                                    <h2 className="text-2xl font-bold text-primary-900 tracking-tight">Chọn ngôn ngữ của bạn</h2>
                                    <button onClick={() => setShowLangModal(false)} className="w-10 h-10 rounded-full bg-surface-low hover:bg-surface-highest flex items-center justify-center text-primary-900 transition-colors">
                                        <IconX />
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto hide-scrollbar">
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                        {languages.map(lang => (
                                            <button 
                                                key={lang.code} 
                                                onClick={() => setShowLangModal(false)}
                                                className={`flex flex-col items-start p-4 rounded-xl transition-all group text-left border ${lang.active ? 'bg-secondary-500/10 border-secondary-500/20 shadow-sm' : 'border-transparent hover:bg-surface-low hover:border-surface-highest/50'}`}
                                            >
                                                <span className={`font-bold ${lang.active ? 'text-secondary-500' : 'text-primary-900 group-hover:text-secondary-500'} transition-colors`}>{lang.name}</span>
                                                <span className={`text-xs ${lang.active ? 'text-secondary-500/70' : 'text-on-surface/50'} mt-0.5`}>{lang.region}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="px-6 md:px-12 xl:px-24 pt-4 pb-8 flex space-x-2 overflow-x-auto hide-scrollbar">
                        <NavPill icon={<IconBed />} text="Lưu trú" />
                        <NavPill icon={<IconPlane />} text="Chuyến bay" active />
                        <NavPill icon={<IconStore />} text="Cửa hàng" />
                        <NavPill icon={<IconMedical />} text="Y tế" />
                        <NavPill icon={<IconHelp />} text="Hỗ trợ" />
                        <NavPill icon={<IconTaxi />} text="Taxi sân bay" />
                    </div>

                    <div className="px-6 md:px-12 xl:px-24 pt-8 pb-12">
                        <h1 className="text-4xl md:text-[3.5rem] font-bold leading-[110%] tracking-tight mb-4">
                            Cất cánh đến mọi chân trời
                        </h1>
                        <p className="text-xl md:text-[1.375rem] font-medium leading-[140%] text-white/80">
                            Tìm và đặt vé máy bay giá tốt nhất từ hàng trăm hãng hàng không.
                        </p>
                    </div>
                </div>
            );
        };

        const NavPill = ({ icon, text, active }) => (
            <button className={`
                flex items-center space-x-2 px-5 py-2.5 rounded-full whitespace-nowrap transition-all
                ${active 
                    ? 'border border-white/20 bg-white/10 backdrop-blur-md text-white font-semibold' 
                    : 'text-white/80 hover:bg-white/5 hover:text-white font-medium'
                }
            `}>
                {icon}
                <span>{text}</span>
            </button>
        );

        // --- SUB-COMPONENTS FOR SELECTORS ---

        const OriginDropdown = ({ onSelect }) => {
            const airports = [
                { city: 'Hà Nội', code: 'HAN', name: 'Sân bay Nội Bài' },
                { city: 'TP. Hồ Chí Minh', code: 'SGN', name: 'Sân bay Tân Sơn Nhất' },
                { city: 'Đà Nẵng', code: 'DAD', name: 'Sân bay Đà Nẵng' },
                { city: 'Nha Trang', code: 'CXR', name: 'Sân bay Cam Ranh' },
                { city: 'Hải Phòng', code: 'HPH', name: 'Sân bay Cát Bi' },
            ];

            return (
                <div className="absolute top-full left-0 mt-3 w-80 bg-white shadow-dropdown rounded-md p-2 border border-surface-highest/40 z-[150] animate-in">
                    <h4 className="px-4 py-3 text-[10px] font-bold uppercase tracking-widest text-on-surface/40">Thành phố phổ biến</h4>
                    {airports.map((ap) => (
                        <button 
                            key={ap.code}
                            onClick={() => onSelect(`${ap.city} (${ap.code})`)}
                            className="w-full flex items-center space-x-4 px-4 py-3 rounded-xl hover:bg-surface-low transition-colors group text-left"
                        >
                            <div className="w-10 h-10 rounded-full bg-surface-low flex items-center justify-center text-secondary-500 group-hover:bg-secondary-500 group-hover:text-white transition-all">
                                <IconMapPin />
                            </div>
                            <div>
                                <p className="font-bold text-primary-900 text-sm">{ap.city} ({ap.code})</p>
                                <p className="text-[11px] text-on-surface/50">{ap.name}</p>
                            </div>
                        </button>
                    ))}
                </div>
            );
        };

        const CalendarDropdown = ({ onSelect, selectedDate }) => {
            const days = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
            // Simplified grid for May 2026 (based on current time context April/May 2026)
            const dates = Array.from({ length: 31 }, (_, i) => i + 1);
            const startDay = 5; // Friday (Thứ 6) is May 1st 2026

            return (
                <div className="absolute top-full left-0 mt-3 w-[320px] bg-white shadow-dropdown rounded-md p-5 border border-surface-highest/40 z-[150] animate-in">
                    <div className="flex items-center justify-between mb-6 px-1">
                        <h4 className="font-bold text-primary-900">Tháng 5 2026</h4>
                        <div className="flex space-x-2">
                            <button className="p-1 hover:bg-surface-low rounded-full transition-colors"><IconChevronLeft /></button>
                            <button className="p-1 hover:bg-surface-low rounded-full transition-colors"><IconChevronRight /></button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-7 gap-1 mb-2">
                        {days.map(d => <div key={d} className="text-center text-[10px] font-bold text-on-surface/30 uppercase tracking-tighter">{d}</div>)}
                    </div>

                    <div className="grid grid-cols-7 gap-1">
                        {Array(startDay).fill(null).map((_, i) => <div key={`empty-${i}`} />)}
                        {dates.map(d => (
                            <button 
                                key={d} 
                                onClick={() => onSelect(`Th ${((startDay + d - 1) % 7) + 1}, ${d} Tháng 5`)}
                                className={`h-10 w-full rounded-xl flex items-center justify-center text-sm font-semibold transition-all
                                    ${d === 20 ? 'bg-secondary-500 text-white shadow-md' : 'hover:bg-surface-low text-primary-900'}
                                `}
                            >
                                {d}
                            </button>
                        ))}
                    </div>
                    
                    <div className="mt-6 pt-4 border-t border-surface-low flex justify-between items-center px-1">
                        <button className="text-xs font-bold text-on-surface/40 hover:text-primary-900 transition-colors">Xoá</button>
                        <button className="text-xs font-bold text-secondary-500">Hôm nay</button>
                    </div>
                </div>
            );
        };

        // --- MAIN FLIGHT SEARCH MODULE ---
        const FlightSearchModule = () => {
            const [tripType, setTripType] = React.useState('khuhoi');
            const [activeDropdown, setActiveDropdown] = React.useState(null); // 'passengers', 'class', 'origin', 'departure', 'return'

            const [origin, setOrigin] = React.useState('Hà Nội (HAN)');
            const [destination, setDestination] = React.useState('Phú Quốc (PQC)');
            const [departureDate, setDepartureDate] = React.useState('Th 5, 20 Tháng 5');
            const [returnDate, setReturnDate] = React.useState('Thêm ngày về');

            const [adults, setAdults] = React.useState(1);
            const [children, setChildren] = React.useState(0);
            const [infants, setInfants] = React.useState(0);
            const [cabinClass, setCabinClass] = React.useState('Phổ thông');

            const totalPassengers = adults + children + infants;

            const closeAll = () => setActiveDropdown(null);

            const toggle = (name) => {
                setActiveDropdown(activeDropdown === name ? null : name);
            };

            return (
                <div className={`bg-white/90 backdrop-blur-xl shadow-ethereal rounded-[1.5rem] p-4 md:p-6 border border-white/60 relative ${activeDropdown ? 'z-[100]' : 'z-20'}`}>
                    
                    {/* Top Controls */}
                    <div className="flex flex-wrap items-center justify-between mb-4 gap-4 relative z-[20]">
                        <div className="flex space-x-1 bg-surface-low p-1 rounded-full">
                            <button 
                                onClick={() => setTripType('khuhoi')}
                                className={`px-4 py-2 rounded-full text-sm font-semibold transition-colors ${tripType === 'khuhoi' ? 'bg-white text-primary-900 shadow-sm' : 'text-on-surface/60 hover:text-primary-900'}`}
                            >Khứ hồi</button>
                            <button 
                                onClick={() => setTripType('motchieu')}
                                className={`px-4 py-2 rounded-full text-sm font-semibold transition-colors ${tripType === 'motchieu' ? 'bg-white text-primary-900 shadow-sm' : 'text-on-surface/60 hover:text-primary-900'}`}
                            >Một chiều</button>
                        </div>

                        <div className="flex space-x-4 text-sm font-medium text-primary-900 relative">
                            {/* Passenger Selector */}
                            <div className="relative">
