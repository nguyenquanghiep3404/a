<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Sân Bay | Booking.com - The Ethereal Navigator</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration based on Design System -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            900: '#001629',
                            container: '#002b49'
                        },
                        secondary: {
                            500: '#00658d'
                        },
                        tertiary: {
                            accent: '#ffb870'
                        },
                        surface: {
                            bg: '#f6fafe',
                            low: '#f0f4f8',
                            highest: '#dfe3e7',
                            lowest: '#ffffff',
                        },
                        on: {
                            surface: '#171c1f'
                        }
                    },
                    boxShadow: {
                        'ethereal': '0 12px 32px rgba(23, 28, 31, 0.06)',
                        'dropdown': '0 20px 50px rgba(0, 22, 41, 0.15)',
                    },
                    borderRadius: {
                        'DEFAULT': '1rem',
                        'md': '1.5rem',
                        'xl': '3rem',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body {
            background-color: #f6fafe;
            color: #171c1f;
            -webkit-font-smoothing: antialiased;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .animate-in {
            animation: fadeInScale 0.25s ease-out forwards;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const IconBed = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>;
        const IconPlane = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l5.5 4L5 15.5 3 15l-1 1 3 3 1-1-.5-2 3.5-3.5 4 5.5h1.2l.6-1.1c.4-.2.7-.6.6-1.1Z"/></svg>;
        const IconTaxi = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/><rect width="4" height="4" x="10" y="3" rx="1"/></svg>;
        const IconStore = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>;
        const IconMedical = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2s10 4.48 10 10Z"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>;
        const IconHelp = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
        const IconMapPin = ({ className }) => <svg className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconCalendar = ({ className }) => <svg className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconClock = ({ className }) => <svg className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconUser = ({ className }) => <svg className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconGlobe = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
        const IconSparkles = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const IconChevronDown = ({ className }) => <svg className={className} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>;
        const IconCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconPlus = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconMinus = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconHotel = ({ className }) => <svg className={className} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/><path d="M9 7h1"/><path d="M9 11h1"/><path d="M9 15h1"/><path d="M14 7h1"/><path d="M14 11h1"/><path d="M14 15h1"/></svg>;

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden bg-surface-bg font-sans">
                    <HeaderAndHero />
                    
                    <main className="px-6 md:px-12 xl:px-24 max-w-7xl mx-auto -mt-10 relative z-10 pb-8 flex-1 w-full">
                        <TaxiSearchModule />
                        <BenefitsSection />
                        <VehicleFleet />
                        <FAQSection />
                    </main>

                    <Footer />
                    <FloatingAIAssistant />
                </div>
            );
        };

        // --- Components ---

        const HeaderAndHero = () => (
            <div className="bg-gradient-to-br from-primary-900 to-primary-container text-white pb-24 rounded-b-3xl">
                <div className="px-6 md:px-12 xl:px-24 py-5 flex items-center justify-between">
                    <div className="text-2xl font-bold tracking-tight cursor-pointer">Booking.com</div>
                    <div className="hidden lg:flex items-center space-x-6 font-medium text-sm">
                        <button className="flex items-center space-x-1 hover:text-tertiary-accent transition-colors"><IconGlobe /><span>VN</span></button>
                        <div className="flex space-x-3 ml-2">
                            <button className="bg-surface-lowest text-secondary-500 px-5 py-2 rounded-full font-semibold hover:bg-surface-low transition-colors text-xs">Đăng ký</button>
                            <button className="bg-surface-lowest text-secondary-500 px-5 py-2 rounded-full font-semibold hover:bg-surface-low transition-colors text-xs">Đăng nhập</button>
                        </div>
                    </div>
                </div>

                <div className="px-6 md:px-12 xl:px-24 pt-4 pb-8 flex space-x-2 overflow-x-auto hide-scrollbar">
                    <NavPill icon={<IconBed />} text="Lưu trú" />
                    <NavPill icon={<IconPlane />} text="Chuyến bay" />
                    <NavPill icon={<IconStore />} text="Cửa hàng" />
                    <NavPill icon={<IconMedical />} text="Y tế" />
                    <NavPill icon={<IconHelp />} text="Hỗ trợ" />
                    <NavPill icon={<IconTaxi />} text="Taxi sân bay" active />
                </div>

                <div className="px-6 md:px-12 xl:px-24 pt-8 pb-12">
                    <h1 className="text-4xl md:text-[3.5rem] font-bold leading-[110%] tracking-tight mb-4 max-w-2xl">
                        Di chuyển từ sân bay thoải mái và an tâm
                    </h1>
                    <p className="text-xl md:text-[1.375rem] font-medium leading-[140%] text-white/80">
                        Đặt trước taxi sân bay với mức giá cố định, tài xế chuyên nghiệp.
                    </p>
                </div>
            </div>
        );

        const NavPill = ({ icon, text, active }) => (
            <button className={`
                flex items-center space-x-2 px-5 py-2.5 rounded-full whitespace-nowrap transition-all
                ${active 
                    ? 'border border-white/20 bg-white/10 backdrop-blur-md text-white font-semibold' 
                    : 'text-white/80 hover:bg-white/5 hover:text-white font-medium'
                }
            `}>
                {icon}
                <span>{text}</span>
            </button>
        );

        const TaxiSearchModule = () => {
            const [activePopup, setActivePopup] = useState(null); // 'date', 'passengers', 'destination'
            const [date, setDate] = useState("20 Thg 5");
            const [time, setTime] = useState("14:30");
            const [passengers, setPassengers] = useState(2);
            const [destination, setDestination] = useState("");
            
            const moduleRef = useRef(null);

            const suggestedHotels = [
                { name: "Vinpearl Resort & Spa Phú Quốc", location: "Bãi Dài, Gành Dầu" },
                { name: "JW Marriott Phu Quoc Emerald Bay", location: "Bãi Khem, An Thới" },
                { name: "InterContinental Phu Quoc Long Beach", location: "Bãi Trường, Dương Tơ" },
                { name: "Novotel Phu Quoc Resort", location: "Dương Tơ, Phú Quốc" },
                { name: "Meliá Vinpearl Phu Quoc", location: "Khu Bãi Dài, xã Gành Dầu" }
            ];

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (moduleRef.current && !moduleRef.current.contains(event.target)) {
                        setActivePopup(null);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            return (
                <div ref={moduleRef} className="bg-white/90 backdrop-blur-xl shadow-ethereal rounded-[1.5rem] p-5 md:p-6 border border-white/60 relative z-50">
                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-2">
                        {/* Pickup - Fixed to Phu Quoc Airport */}
                        <div className="bg-surface-low rounded-2xl p-3 px-4 transition-colors group border border-transparent opacity-80 cursor-default">
                            <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Điểm đón</label>
                            <div className="flex items-center space-x-3">
                                <IconMapPin className="text-secondary-500 shrink-0" />
                                <input 
                                    type="text" 
                                    value="Sân bay Phú Quốc" 
                                    readOnly 
                                    className="bg-transparent border-none outline-none w-full text-primary-900 font-bold text-sm cursor-default" 
                                />
                            </div>
                        </div>

                        {/* Drop-off with Suggestions */}
                        <div className="relative">
                            <div 
                                onClick={() => setActivePopup('destination')}
                                className={`bg-surface-low rounded-2xl p-3 px-4 transition-all cursor-text group border border-transparent ${activePopup === 'destination' ? 'ring-2 ring-secondary-500/20 bg-surface-highest' : 'hover:bg-surface-highest'}`}
                            >
                                <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Điểm đến</label>
                                <div className="flex items-center space-x-3">
                                    <IconMapPin className={`shrink-0 transition-colors ${activePopup === 'destination' ? 'text-secondary-500' : 'text-on-surface/40 group-hover:text-secondary-500'}`} />
                                    <input 
                                        type="text" 
                                        placeholder="Khách sạn hoặc địa chỉ..." 
                                        value={destination}
                                        onChange={(e) => setDestination(e.target.value)}
                                        className="bg-transparent border-none outline-none w-full text-primary-900 font-bold placeholder:text-on-surface/30 text-sm" 
                                    />
                                </div>
                            </div>

                            {/* Destination Suggestions Popup */}
                            {activePopup === 'destination' && (
                                <div className="absolute top-[calc(100%+8px)] left-0 w-full bg-white shadow-dropdown p-2 z-[110] border border-white/60 animate-in rounded-2xl overflow-hidden">
                                    <p className="px-4 py-2 text-[10px] font-bold text-on-surface/40 uppercase tracking-widest">Gợi ý tại Phú Quốc</p>
                                    <div className="max-h-[280px] overflow-y-auto pr-1 hide-scrollbar">
                                        {suggestedHotels.map((hotel, idx) => (
                                            <button 
                                                key={idx}
                                                onClick={() => {
                                                    setDestination(hotel.name);
                                                    setActivePopup(null);
                                                }}
                                                className="w-full flex items-center space-x-4 p-3 hover:bg-surface-low rounded-xl transition-all group text-left"
                                            >
                                                <div className="w-10 h-10 rounded-lg bg-surface-low flex items-center justify-center text-on-surface/30 group-hover:text-secondary-500 group-hover:bg-white transition-all">
                                                    <IconHotel />
                                                </div>
                                                <div>
                                                    <p className="text-sm font-bold text-primary-900 group-hover:text-secondary-500 transition-colors">{hotel.name}</p>
                                                    <p className="text-[11px] text-on-surface/40 font-medium">{hotel.location}</p>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Date & Time Selector Trigger */}
                        <div 
                            onClick={() => setActivePopup(activePopup === 'date' ? null : 'date')}
                            className={`bg-surface-low rounded-2xl p-3 px-4 transition-all cursor-pointer group flex space-x-2 border border-transparent ${activePopup === 'date' ? 'ring-2 ring-secondary-500/20 bg-surface-highest' : 'hover:bg-surface-highest'}`}
                        >
                            <div className="flex-1">
                                <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Ngày đón</label>
                                <div className="flex items-center space-x-2">
                                    <IconCalendar className={`shrink-0 transition-colors ${activePopup === 'date' ? 'text-secondary-500' : 'text-on-surface/40 group-hover:text-secondary-500'}`} />
                                    <span className="text-primary-900 font-bold text-sm">{date}</span>
                                </div>
                            </div>
                            <div className="w-[1px] bg-on-surface/5 my-1"></div>
                            <div className="flex-1 pl-2">
                                <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Giờ đón</label>
                                <div className="flex items-center space-x-2">
                                    <IconClock className={`shrink-0 transition-colors ${activePopup === 'date' ? 'text-secondary-500' : 'text-on-surface/40 group-hover:text-secondary-500'}`} />
                                    <span className="text-primary-900 font-bold text-sm">{time}</span>
                                </div>
                            </div>
                        </div>

                        {/* Passengers Trigger */}
                        <div className="flex space-x-2">
                            <div 
                                onClick={() => setActivePopup(activePopup === 'passengers' ? null : 'passengers')}
                                className={`flex-1 bg-surface-low rounded-2xl p-3 px-4 transition-all cursor-pointer group border border-transparent ${activePopup === 'passengers' ? 'ring-2 ring-secondary-500/20 bg-surface-highest' : 'hover:bg-surface-highest'}`}
                            >
                                <label className="text-[10px] font-bold text-on-surface/40 uppercase tracking-widest block mb-1">Hành khách</label>
                                <div className="flex items-center space-x-3">
                                    <IconUser className={`shrink-0 transition-colors ${activePopup === 'passengers' ? 'text-secondary-500' : 'text-on-surface/40 group-hover:text-secondary-500'}`} />
                                    <span className="text-primary-900 font-bold text-sm">{passengers} Người</span>
                                </div>
                            </div>
                            <button className="bg-secondary-500 hover:bg-primary-900 text-white font-bold px-6 rounded-2xl transition-all shadow-md active:scale-95">
                                Tìm
                            </button>
                        </div>
                    </div>

                    {/* Popups (The Ethereal Dropdowns) */}
                    
                    {/* Date/Time Popup */}
                    {activePopup === 'date' && (
                        <div className="absolute top-[calc(100%+12px)] left-0 lg:left-[50%] lg:-translate-x-[50%] w-full lg:w-[480px] bg-white shadow-dropdown p-6 z-[100] border border-white/60 animate-in rounded-3xl">
                            <div className="flex flex-col md:flex-row gap-8">
                                <div className="flex-1">
                                    <div className="flex items-center justify-between mb-4">
                                        <h4 className="text-xs font-bold uppercase tracking-widest text-primary-900">Tháng 5, 2026</h4>
                                        <div className="flex space-x-2">
                                            <button className="p-1 hover:bg-surface-low rounded-lg transition-colors text-on-surface/40"><IconChevronDown className="rotate-90" /></button>
                                            <button className="p-1 hover:bg-surface-low rounded-lg transition-colors text-on-surface/40"><IconChevronDown className="-rotate-90" /></button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-7 gap-1 text-center mb-2">
                                        {['T2','T3','T4','T5','T6','T7','CN'].map(d => <span key={d} className="text-[10px] font-bold text-on-surface/30">{d}</span>)}
                                    </div>
                                    <div className="grid grid-cols-7 gap-1">
                                        {Array.from({length: 31}, (_, i) => i + 1).map(day => (
                                            <button 
                                                key={day}
                                                onClick={() => { setDate(`${day} Thg 5`); }}
                                                className={`h-8 w-8 text-xs rounded-full transition-all flex items-center justify-center
                                                    ${day === 20 ? 'bg-secondary-500 text-white font-bold shadow-md scale-110' : 'hover:bg-surface-low text-primary-900 font-medium'}
                                                `}
                                            >
                                                {day}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-full md:w-32 border-t md:border-t-0 md:border-l border-surface-low pt-4 md:pt-0 md:pl-6">
                                    <h4 className="text-xs font-bold uppercase tracking-widest text-primary-900 mb-4">Giờ đón</h4>
                                    <div className="h-[180px] overflow-y-auto pr-2 hide-scrollbar space-y-1">
                                        {['08:00', '09:30', '11:00', '14:30', '16:00', '18:30', '20:00', '22:00'].map(t => (
                                            <button 
                                                key={t}
                                                onClick={() => setTime(t)}
                                                className={`w-full py-2 text-xs rounded-xl font-bold transition-all
                                                    ${t === time ? 'bg-primary-900 text-white shadow-sm' : 'text-on-surface/60 hover:bg-surface-low'}
                                                `}
                                            >
                                                {t}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="mt-6 flex justify-end">
                                <button onClick={() => setActivePopup(null)} className="bg-primary-900 text-white text-[11px] font-bold px-6 py-2.5 rounded-full hover:bg-secondary-500 transition-colors">Xác nhận</button>
                            </div>
                        </div>
                    )}

                    {/* Passengers Popup */}
                    {activePopup === 'passengers' && (
                        <div className="absolute top-[calc(100%+12px)] right-0 w-full lg:w-[320px] bg-white shadow-dropdown p-6 z-[100] border border-white/60 animate-in rounded-3xl">
                            <h4 className="text-xs font-bold uppercase tracking-widest text-primary-900 mb-6">Số lượng hành khách</h4>
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-sm font-bold text-primary-900">Hành khách</p>
                                    <p className="text-[10px] text-on-surface/40 font-medium">Bao gồm trẻ em và trẻ sơ sinh</p>
                                </div>
                                <div className="flex items-center space-x-4">
                                    <button 
                                        disabled={passengers <= 1}
                                        onClick={() => setPassengers(p => p - 1)}
                                        className="w-10 h-10 rounded-xl bg-surface-low flex items-center justify-center text-primary-900 hover:bg-surface-highest transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                                    >
                                        <IconMinus />
                                    </button>
                                    <span className="text-lg font-bold text-primary-900 w-4 text-center">{passengers}</span>
                                    <button 
                                        disabled={passengers >= 16}
                                        onClick={() => setPassengers(p => p + 1)}
