# 🗺️ TÀI LIỆU HƯỚNG DẪN BÀN GIAO & ROADMAP HỆ THỐNG
Dự án: Hệ Sinh Thái Du Lịch Kỹ Thuật Số Phú Quốc (Phú Quốc Ecosystem)

---

## 🔐 1. TÀI KHOẢN TRUY CẬP MẪU (TEST ACCOUNTS)
Để thuận tiện cho quá trình kiểm thử và nghiệm thu, hệ thống đã nạp sẵn dữ liệu giả lập (Seeded Data). Vui lòng sử dụng các tài khoản sau:

| Loại Tài Khoản | Email | Mật khẩu (Password) | Ghi chú |
| :--- | :--- | :--- | :--- |
| **System Admin**| `admin@pqgo.vn` | `adminpassword123` | Quản trị viên hệ thống tiêu chuẩn |
| **Chủ Khách Sạn**| `hotel1@pqgo.vn` đến `hotel10@pqgo.vn`| `password123` | Test quản trị Booking khách sạn |
| **Chủ Nhà Hàng** | `resto1@pqgo.vn` đến `resto10@pqgo.vn`| `password123` | Test gian hàng số (thực đơn) |
| **Chủ Tour** | `tour1@pqgo.vn` đến `tour10@pqgo.vn` | `password123` | Test duyệt, thêm, quản lý slots Tour |

*(Hệ thống hỗ trợ du khách đăng ký mới trực tiếp qua giao diện Home, tuy nhiên có thể mock tạm tài khoản user qua các email trên với Role merchant trong Dashboard).*

---

## 📈 2. PHÂN TÍCH TIẾN ĐỘ DỰ ÁN (DỰA TRÊN NGHIỆP VỤ)

### 🏨 Chức năng Đặt Phòng Khách Sạn (Hotel Booking): Hoàn thiện **~85 - 95%**
- **Điểm sáng đã thực hiện:**
  - Giao diện Listing & Details 100% chuẩn *Ethereal Navigator* cao cấp (Sử dụng Tonal Layering, loại bỏ borders).
  - Tích hợp Modal tìm kiếm động (Search Modal Edit), lấy params Location/Check-in/Guests thông minh chuẩn OTA.
  - Workflow đặt phòng khép kín: Giới hạn người dùng (buộc đăng nhập) -> Màn hình Checkout -> Chức năng Thanh toán -> Callback xử lý vé.
  - Chức năng quản lý Booking Users: Xem vé cá nhân, áp dụng luồng Logic hủy vé (Refund/Non-refundable policies).
 
### 🏝️ Chức năng Đặt Tour & Trải Nghiệm (Tour Booking): Hoàn thiện **~90%**
- **Điểm sáng đã thực hiện:** - Giao diện Booking trải nghiệm mượt mà, đồng bộ với Merchant Portal quản lý suất trong thời gian thực. (Dynamic Tour Availability).
  - Nghiệp vụ thanh toán/mất slot (Timeout Checkout), verify Post-Payment với PayPal. 
  - Quy trình Admin Approval Tour chặt chẽ: Tour của Merchant chưa được Verify thì Admin không thể phê duyệt.
  - Vé điện tử (E-ticket/QR code) sau thanh toán thành công đã có mặt ở `/account`.
- **Phần còn lại:** Triển khai Notification qua SMS hoặc Sync trạng thái thời tiết báo hủy tour.

### 🍔 Gian Hàng Số F&B (Module B) & Modules Khác
- **F&B (Tiến độ ~70%):** Cấu trúc Data Entity gồm `Merchant`, `Storefront`, `MenuItem` đã được seed vào hệ thống. Các trang danh sách đang lấy từ API lên giao diện `/shop`. Tính năng Đặt suất ăn và Booking Bàn qua Websocket sẽ cập nhật tại Phase 2.
- **Smart Map, An Toàn/Y Tế (Modules C & D):** UI đã được thiết lập tại `/care` & `/safety`. Entity `MedicalRequest` đã dựng ở DB. Tiếp theo cần kết nối với Offline Map API (Mapbox) để load tileset PQ.

---

## 🌐 3. SƠ ĐỒ ĐỊNH TUYẾN CHÍNH (ROUTES GUIDE)

### Cổng Frontend (Cổng Người dùng - Port 3000)
| Module / Tên trang | Route (Path) | Mục đích / Trạng thái |
| :--- | :--- | :--- |
| **Trang chủ** | `/` | Tìm kiếm tổng hợp |
| **Xác thực User** | `/login`, `/register`, `/forgot-password` | Hệ thống Auth của khách du lịch |
| **Lịch sử / Account** | `/account` | Quản lý vé Hotel/Tour đã mua |
| **Khách sạn (Vòng lặp booking)**| `/hotels` -> `/hotels/[id]` -> `/hotels/checkout` | Danh sách, Chi tiết, và Thanh toán |
| **Tour du lịch** | `/book` -> `/book/checkout` | Chọn tour đảo, lặn san hô, VinWonders |
| **Ẩm thực & Shop** | `/shop` -> `/shop/[id]` | Khám phá quán ăn, bar (Digital Storefront) |
| **Tính năng Di chuyển** | `/taxi`, `/flights` | Taxi sân bay, Vé bay (Mockup) |
| **Sức khỏe & Y tế** | `/care`, `/safety` | Bác sĩ tận vùng, Hotline khẩn cấp |
| **Sim 4G / Telecom** | `/telecom` | Mua SIM Du lịch tại đảo |

### Cổng Merchant Portal (Cổng Đối tác - Port 3000)
| Khu vực | Route (Path) | Mục đích |
| :--- | :--- | :--- |
| **Xác thực Merchant** | `/merchant/login`, `/merchant/register` | Đăng ký & Đăng nhập cho Nhà cung cấp |
| **Quản trị gian hàng** | `/merchant/dashboard` | Thêm món ăn, phòng nghỉ, mở bán Tour |

### Cổng Admin Dashboard (Cổng Quản trị - Port 3000)
| Khu vực | Route (Path) | Mục đích |
| :--- | :--- | :--- |
| **Đăng nhập Admin** | `/admin/login` | |
| **Dashboard Control**| `/admin` | Thống kê số lượng giao dịch toàn platform |
| **Users & Merchants**| `/admin/users`, `/admin/merchants` | Duyệt (Verify) Merchant KYC |
| **Giao dịch (Bookings)**| `/admin/bookings`, `/admin/tours` | Quản lý/Hủy vé, Approval/Reject Tour |

### Cổng API Backend (RESTFul API - Port 5000)
**BaseURL:** `http://localhost:5000/api/v1`
Hệ thống Micro-routing hiện có:
- `/auth`: Đăng nhập, Register.
- `/users`: Update Profile, Get Session.
- `/merchants`: Phê duyệt trạng thái (Verify/Approve).
- `/hotels` & `/tours`: Get Listings, Details, Filter (Price, Stars).
- `/bookings`: Tạo đơn hàng (Create Order), Tính tiền cọc (Checkout logic).
- `/payments`: Call API Gateway, Approve Order, Generate eTicket.
    </textarea>

    <script>
        // 1. Render Markdown sang HTML lúc tải trang
        document.addEventListener('DOMContentLoaded', () => {
            const rawMarkdown = document.getElementById('markdown-source').value;
            const htmlContent = marked.parse(rawMarkdown);
            document.getElementById('source-html').innerHTML = htmlContent;
        });

        // Hàm hiển thị thông báo Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // 2. Chức năng Copy nội dung
        function copyContent() {
            const contentBlock = document.getElementById('source-html');
            const range = document.createRange();
            range.selectNode(contentBlock);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            
            try {
                document.execCommand('copy');
                showToast('Đã sao chép nội dung vào khay nhớ tạm!');
            } catch (err) {
                showToast('Không thể sao chép. Vui lòng thử bôi đen thủ công.');
            }
            window.getSelection().removeAllRanges();
        }

        // 3. Chức năng chính: Tải xuống dưới dạng File Word (.doc)
        function downloadAsWord() {
            // Định dạng CSS nhúng dành riêng cho MS Word
            const wordStyles = `
                <style>
                    body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.5; color: #000; }
                    h1 { color: #1e40af; font-size: 24pt; text-align: center; margin-bottom: 20px; }
                    h2 { color: #1f2937; font-size: 18pt; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 24px; }
                    h3 { color: #374151; font-size: 14pt; margin-top: 16px; }
                    p { margin-bottom: 12px; }
                    table { border-collapse: collapse; width: 100%; margin-top: 15px; margin-bottom: 15px; }
                    th, td { border: 1px solid #000000; padding: 8px; text-align: left; vertical-align: top; }
                    th { background-color: #f2f2f2; font-weight: bold; }
                    code { background-color: #f4f4f4; padding: 2px 5px; font-family: 'Courier New', monospace; font-size: 10pt; color: #d32f2f;}
                    ul { margin-bottom: 15px; }
                    li { margin-bottom: 5px; }
                    hr { border: 0; border-top: 1px solid #ccc; margin: 20px 0; }
                </style>
            `;

            // Lấy HTML đã render
            const documentContent = document.getElementById('source-html').innerHTML;

            // Xây dựng cấu trúc HTML đạt chuẩn để Word hiểu
            const htmlDocTemplate = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office'
                      xmlns:w='urn:schemas-microsoft-com:office:word'
                      xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>ROUTES_GUIDE</title>
                    ${wordStyles}
                </head>
                <body>
                    ${documentContent}
                </body>
                </html>
            `;

            // Chuyển đối thành Blob MS Word
            const blob = new Blob(['\ufeff', htmlDocTemplate], {
                type: 'application/msword'
            });

            // Kích hoạt tiến trình Download
            const url = URL.createObjectURL(blob);
            const downloadLink = document.createElement('a');
            downloadLink.href = url;
            downloadLink.download = 'Tai_Lieu_Huong_Dan_Ban_Giao_He_Thong.doc';
            
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            
            // Dọn dẹp memory
            URL.revokeObjectURL(url);
            
            showToast('Đang tải file Word về máy của bạn!');
        }
    </script>
